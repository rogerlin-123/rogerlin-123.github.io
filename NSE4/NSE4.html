        // Core Logic
        let currentIndex = 0;
        let selectedAnswers = []; 
        let isAnswered = false;
        let quizResults = {}; 
        let flaggedQuestions = new Set(); // 儲存被標記的題目 ID
        let isReversed = false;
        let isFirstLoad = true; // 新增：用於判斷是否為剛載入網頁

        // LOCALSTORAGE KEY
        const STORAGE_KEY = 'fcss_nse4_progress';

        // 產生目前的展示順序
        function buildDisplayOrder() {
            const arr = questionsData.map((_, i) => i);
            return isReversed ? arr.reverse() : arr;
        }
        let displayOrder = buildDisplayOrder();

        // 強制移除焦點，避免按鈕視覺卡住
        function blurFocus() {
            if (document.activeElement instanceof HTMLElement) {
                document.activeElement.blur();
            }
        }

        // 儲存進度到 LocalStorage
        function saveProgress() {
            const progressObj = {
                currentIndex: currentIndex,
                quizResults: quizResults,
                flaggedQuestions: Array.from(flaggedQuestions), // Set 轉 Array
                selectedAnswers: selectedAnswers,
                isAnswered: isAnswered,
                isReversed: isReversed
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(progressObj));
        }

        // 讀取進度從 LocalStorage
        function loadProgress() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                try {
                    const progressObj = JSON.parse(savedData);
                    currentIndex = progressObj.currentIndex !== undefined ? progressObj.currentIndex : 0;
                    quizResults = progressObj.quizResults || {};
                    if (progressObj.flaggedQuestions) {
                        flaggedQuestions = new Set(progressObj.flaggedQuestions);
                    }
                    selectedAnswers = progressObj.selectedAnswers || [];
                    isAnswered = progressObj.isAnswered || false;
                    isReversed = progressObj.isReversed || false;
                    displayOrder = buildDisplayOrder();
                } catch (error) {
                    console.error("載入進度失敗：", error);
                }
            }
        }

        const quizContent = document.getElementById('quiz-content');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const submitBtn = document.getElementById('submit-btn');
        const progressBar = document.getElementById('progress-bar');
        const currentProgress = document.getElementById('current-progress');
        const totalCount = document.getElementById('total-count');
        const footerControls = document.getElementById('footer-controls');

        // Palette Logic
        const paletteModal = document.getElementById('palette-modal');
        const paletteBackdrop = document.getElementById('palette-backdrop');
        const palettePanel = document.getElementById('palette-panel');
        const paletteGrid = document.getElementById('palette-grid');

        // ==== 鍵盤事件監聽 (快捷鍵實作) ====
        document.addEventListener('keydown', (e) => {
            // 避免在輸入框中觸發
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            // 1-6 數字鍵選擇選項 A-F
            const keyMap = {'1': 'A', '2': 'B', '3': 'C', '4': 'D', '5': 'E', '6': 'F'};
            if (keyMap[e.key] && !isAnswered) {
                const optionIndex = e.key.charCodeAt(0) - 49; 
                const cards = document.querySelectorAll('.option-card');
                if (cards[optionIndex]) {
                    const currentQ = questionsData[displayOrder[currentIndex]];
                    const isMultiple = currentQ.answer.includes(',');
                    toggleOption(keyMap[e.key], isMultiple, cards[optionIndex]);
                }
            }

            // 左方向鍵: 上一題
            if (e.key === 'ArrowLeft') {
                prevQuestion();
            }
            
            // 右方向鍵: 下一題
            if (e.key === 'ArrowRight') {
                nextQuestion();
            }

            // Enter 鍵: 提交或下一題
            if (e.key === 'Enter') {
                // 若已經答完且在看結果頁面，阻止觸發
                if (document.getElementById('result-banner') && !document.getElementById('result-banner').classList.contains('hidden') && currentIndex === questionsData.length) return; 

                if (!isAnswered && !submitBtn.disabled) {
                    submitAnswer();
                } else if (isAnswered) {
                    nextQuestion();
                }
            }

            // M 鍵: 標記/取消標記本題
            if (e.key.toLowerCase() === 'm') {
                toggleFlag();
            }

            // N 鍵: 清除本題進度
            if (e.key.toLowerCase() === 'n') {
                clearCurrentQuestion();
            }
        });

        // Init
        document.addEventListener("DOMContentLoaded", () => {
            totalCount.innerText = questionsData.length + " Questions";
            loadProgress(); // 優先讀取進度
            
            // 根據讀取的 isReversed 更新 UI 排序按鈕狀態
            const btn = document.getElementById('order-btn');
            if (btn) {
                btn.innerHTML = isReversed
                    ? '<i class="fa-solid fa-arrow-up"></i> <span class="hidden sm:inline">逆序</span>'
                    : '<i class="fa-solid fa-arrow-down"></i> <span class="hidden sm:inline">正序</span>';
                btn.className = (isReversed
                    ? 'bg-pink-600 hover:bg-pink-700'
                    : 'bg-purple-600 hover:bg-purple-700') + ' text-white px-3 py-1.5 rounded-lg text-sm transition-colors flex items-center gap-2 shadow-sm font-medium';
            }

            updateStats();
            renderQuestion(currentIndex);
        });

        // 切換正序/逆序
        function toggleOrder() {
            blurFocus();
            isReversed = !isReversed;
            displayOrder = buildDisplayOrder();
            currentIndex = 0;
            const btn = document.getElementById('order-btn');
            if (btn) {
                btn.innerHTML = isReversed
                    ? '<i class="fa-solid fa-arrow-up"></i> <span class="hidden sm:inline">逆序</span>'
                    : '<i class="fa-solid fa-arrow-down"></i> <span class="hidden sm:inline">正序</span>';
                btn.className = (isReversed
                    ? 'bg-pink-600 hover:bg-pink-700'
                    : 'bg-purple-600 hover:bg-purple-700') + ' text-white px-3 py-1.5 rounded-lg text-sm transition-colors flex items-center gap-2 shadow-sm font-medium';
            }
            saveProgress();
            renderQuestion(currentIndex);
        }

        // 跳轉題號
        function promptJump() {
            blurFocus();
            const ans = prompt('跳到第幾題? (1-' + questionsData.length + ')', '1');
            if (ans === null) return;
            const n = parseInt(ans, 10);
            if (isNaN(n) || n < 1 || n > questionsData.length) {
                alert('題號必須介於 1 到 ' + questionsData.length);
                return;
            }
            const dataIdx = questionsData.findIndex(q => q.id === n);
            if (dataIdx < 0) {
                alert('找不到 Q' + n);
                return;
            }
            currentIndex = displayOrder.indexOf(dataIdx);
            saveProgress();
            renderQuestion(currentIndex);
        }

        // 標記本題 (Flag)
        function toggleFlag() {
            blurFocus();
            const currentQId = questionsData[displayOrder[currentIndex]].id;
            const btnFlag = document.getElementById('btn-flag');
            
            if (flaggedQuestions.has(currentQId)) {
                flaggedQuestions.delete(currentQId);
                btnFlag.classList.replace('bg-red-700', 'bg-red-500');
                btnFlag.innerHTML = '<i class="fa-regular fa-flag"></i> <span class="hidden sm:inline">標記本題</span>';
            } else {
                flaggedQuestions.add(currentQId);
                btnFlag.classList.replace('bg-red-500', 'bg-red-700');
                btnFlag.innerHTML = '<i class="fa-solid fa-flag"></i> <span class="hidden sm:inline">取消標記</span>';
            }
            
            updateStats();
            saveProgress();
            if (!paletteModal.classList.contains('hidden')) renderPaletteGrid();
        }

        // 尋找下一個標記
        function nextFlag() {
            blurFocus();
            if (flaggedQuestions.size === 0) { alert('目前沒有任何標記的題目。'); return; }
            for (let pos = currentIndex + 1; pos < questionsData.length; pos++) {
                if (flaggedQuestions.has(questionsData[displayOrder[pos]].id)) {
                    currentIndex = pos;
                    saveProgress();
                    renderQuestion(currentIndex);
                    return;
                }
            }
            // 若後面沒有，循環找最前面的
            for (let pos = 0; pos <= currentIndex; pos++) {
                if (flaggedQuestions.has(questionsData[displayOrder[pos]].id)) {
                    currentIndex = pos;
                    saveProgress();
                    renderQuestion(currentIndex);
                    return;
                }
            }
        }

        // 尋找上一個標記
        function prevFlag() {
            blurFocus();
            if (flaggedQuestions.size === 0) { alert('目前沒有任何標記的題目。'); return; }
            for (let pos = currentIndex - 1; pos >= 0; pos--) {
                if (flaggedQuestions.has(questionsData[displayOrder[pos]].id)) {
                    currentIndex = pos;
                    saveProgress();
                    renderQuestion(currentIndex);
                    return;
                }
            }
            // 若前面沒有，找最後面的
            for (let pos = questionsData.length - 1; pos >= currentIndex; pos--) {
                if (flaggedQuestions.has(questionsData[displayOrder[pos]].id)) {
                    currentIndex = pos;
                    saveProgress();
                    renderQuestion(currentIndex);
                    return;
                }
            }
        }

        // 清除本題進度
        function clearCurrentQuestion() {
            blurFocus();
            const currentQId = questionsData[displayOrder[currentIndex]].id;
            delete quizResults[currentQId];
            selectedAnswers = [];
            isAnswered = false;
            updateStats();
            saveProgress();
            renderQuestion(currentIndex);
        }

        // 更新左側統計數據
        function updateStats() {
            const total = questionsData.length;
            const answeredCount = Object.keys(quizResults).length;
            const correctCount = Object.values(quizResults).filter(r => r === true).length;
            const flaggedCount = flaggedQuestions.size;
            const percentage = answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0;

            document.getElementById('stat-progress').innerText = `${answeredCount} / ${total}`;
            document.getElementById('stat-flagged').innerText = flaggedCount;
            document.getElementById('stat-correct').innerText = correctCount;
            document.getElementById('stat-accuracy').innerText = `${percentage}%`;
        }

        function escapeHTML(s) { 
            if (!s) return '';
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); 
        }

        function renderQuestion(index) {
            const dataIdx = displayOrder[index];
            const q = questionsData[dataIdx];
            
            // 初始化狀態
            isAnswered = quizResults.hasOwnProperty(q.id);
            
            // 解決「下一題自動帶入上一題答案」的 Bug
            if (isFirstLoad) {
                // 如果是網頁剛載入的第一次渲染，保留由 loadProgress 取回的 selectedAnswers
                isFirstLoad = false;
            } else {
                // 只要是切換題目（不論上一題是否已送出），都必須清空選擇狀態，防止答案殘留
                selectedAnswers = []; 
            }

            // 更新標記按鈕 UI
            const btnFlag = document.getElementById('btn-flag');
            if (flaggedQuestions.has(q.id)) {
                btnFlag.classList.replace('bg-red-500', 'bg-red-700');
                btnFlag.innerHTML = '<i class="fa-solid fa-flag"></i> <span class="hidden sm:inline">取消標記</span>';
            } else {
                btnFlag.classList.replace('bg-red-700', 'bg-red-500');
                btnFlag.innerHTML = '<i class="fa-regular fa-flag"></i> <span class="hidden sm:inline">標記本題</span>';
            }

            document.getElementById('q-id-display').innerText = `第 ${index + 1} 題 (ID: Q${q.id})`;
            
            // Image Logic
            let exhibitHtml = '';
            if (q.images && q.images.length) {
                exhibitHtml = '<div class="my-6 flex flex-col items-center justify-center gap-4">';
                q.images.forEach((img, i) => {
                    const pid = 'placeholder-' + q.id + '-' + i;
                    exhibitHtml += `
                        <img src="png/${img}" alt="Exhibit ${i+1} for Q${q.id}" class="max-w-full h-auto rounded-lg border border-slate-300 shadow-sm" style="display:none" onload="this.style.display='block'" onerror="this.style.display='none'; document.getElementById('${pid}').classList.remove('hidden');">
                        <div id="${pid}" class="hidden w-full bg-slate-50 border-2 border-dashed border-slate-300 rounded-lg h-32 flex flex-col items-center justify-center text-slate-400 p-4 text-center">
                            <i class="fa-regular fa-image text-3xl mb-2"></i>
                            <span class="text-xs font-semibold mb-1">Q${q.id} Exhibit ${i+1} (png/${img})</span>
                            <span class="text-[10px]">To view the image, please ensure the file <b>${img}</b> is located in the <b>png</b> folder.</span>
                        </div>`;
                });
                exhibitHtml += '</div>';
            }

            // Options Logic - 動態計算正確答案數量
            const correctAnswersCount = q.answer.split(',').filter(s => s.trim() !== '' && s.trim() !== '—').length;
            const isMultiple = correctAnswersCount > 1;
            
            const typeText = isMultiple ? 
                `<span class="text-xs bg-slate-200 text-slate-600 px-2 py-0.5 rounded ml-2">Multiple Choice (需選 ${correctAnswersCount} 項)</span>` : 
                '<span class="text-xs bg-slate-200 text-slate-600 px-2 py-0.5 rounded ml-2">Single Choice</span>';

            let optionsHtml = q.options.map((opt, i) => {
                const letter = String.fromCharCode(65 + i); 
                
                let cleanOpt = opt.trim();
                const prefixRegex = new RegExp(`^${letter}[\\.\\)]?\\s*`);
                if (prefixRegex.test(cleanOpt)) {
                    cleanOpt = cleanOpt.replace(prefixRegex, '').trim();
                }

                // 處理 localStorage 還原的選中狀態
                let isSelected = selectedAnswers.includes(letter);
                let selectedClass = isSelected ? 'selected' : '';
                let indicatorHidden = isSelected ? '' : 'hidden';

                return `
                <div class="option-card border border-slate-200 rounded-lg p-4 mb-3 flex items-center gap-3 w-full ${selectedClass}" 
                     onclick="toggleOption('${letter}', ${isMultiple}, this)" data-letter="${letter}">
                    <div class="flex-shrink-0 w-6 h-6 rounded-full border-2 border-slate-300 flex items-center justify-center option-indicator bg-white">
                        <div class="w-3 h-3 ${isMultiple ? 'rounded-sm' : 'rounded-full'} bg-blue-500 ${indicatorHidden}"></div>
                    </div>
                    <div class="text-slate-700 text-sm md:text-base leading-relaxed select-none text-left flex-1 break-words">
                        <span class="font-bold mr-1 text-slate-500">${letter}.</span> ${escapeHTML(cleanOpt)}
                    </div>
                </div>`;
            }).join('');

            // Render
            quizContent.innerHTML = `
                <div class="flex justify-between items-start mb-4 fade-in">
                    <span class="bg-slate-800 text-white text-sm font-bold px-3 py-1 rounded">第 ${index + 1} 題</span>
                    ${typeText}
                </div>
                
                <div class="mb-2 fade-in">
                    <p class="font-bold text-slate-800 text-lg md:text-xl mb-3 leading-snug question-text">${escapeHTML(q.q_en)}</p>
                </div>

                <div class="fade-in">
                    ${exhibitHtml}
                </div>

                <div id="options-container" class="mt-4 mb-6 fade-in w-full">
                    ${optionsHtml}
                </div>

                <!-- Explanation Area (Initially Hidden) -->
                <div id="explanation-area" class="hidden mt-4 bg-green-50 rounded-lg p-6 border border-green-100 fade-in text-left w-full">
                    <div id="result-banner" class="mb-4 p-3 rounded-lg font-bold text-lg text-center"></div>
                    <div class="flex items-center gap-2 mb-3 flex-wrap">
                        <span class="font-bold text-green-700"><i class="fa-solid fa-check-circle mr-1"></i> Correct Answer:</span>
                        <span class="font-bold text-xl text-green-800">${escapeHTML(q.answer)}</span>
                        <span class="ml-2 text-sm text-slate-600">| Your answer: <span id="your-answer-display" class="font-semibold">(none)</span></span>
                    </div>
                    <div class="text-sm text-slate-700 leading-relaxed explanation-body">${q.explanation}</div>
                </div>
            `;

            footerControls.classList.remove('hidden');
            updateProgress();
            
            // 如果這題之前已經答過了，直接顯示結果狀態
            if (isAnswered) {
                document.getElementById('explanation-area').classList.remove('hidden');
                submitBtn.classList.add('hidden');
                nextBtn.classList.remove('hidden');
                
                // 視覺上還原對錯狀態並鎖死
                const optionCards = document.querySelectorAll('.option-card');
                const correctAnswersArray = q.answer.split(',').map(s => s.trim());
                
                optionCards.forEach((card) => {
                    card.classList.add('disabled-click');
                    const letter = card.getAttribute('data-letter');
                    const indicator = card.querySelector('.option-indicator');
                    
                    if (correctAnswersArray.includes(letter)) {
                        card.classList.add('correct-answer');
                        indicator.innerHTML = '<i class="fa-solid fa-check text-green-600"></i>';
                        indicator.classList.remove('border-slate-300');
                        indicator.classList.add('border-green-500');
                    } else if (selectedAnswers.includes(letter)) {
                        card.classList.add('wrong-answer');
                        indicator.innerHTML = '<i class="fa-solid fa-xmark text-red-600"></i>';
                        indicator.classList.remove('border-slate-300');
                        indicator.classList.add('border-red-500');
                    }
                });

                // Update Your answer display
                const yourAns = document.getElementById('your-answer-display');
                if (yourAns) {
                    yourAns.textContent = selectedAnswers.length ? selectedAnswers.sort().join(', ') : '(none)';
                    yourAns.className = 'font-semibold ' + (quizResults[q.id] ? 'text-green-700' : 'text-red-700');
                }

                // Update Result Banner
                const banner = document.getElementById('result-banner');
                if (banner) {
                    if (quizResults[q.id]) {
                        banner.innerHTML = '<i class="fa-solid fa-circle-check mr-2"></i> 答對! Correct!';
                        banner.className = 'mb-4 p-3 rounded-lg font-bold text-lg text-center bg-green-200 text-green-800 border-2 border-green-500';
                    } else {
                        banner.innerHTML = '<i class="fa-solid fa-circle-xmark mr-2"></i> 答錯! Incorrect';
                        banner.className = 'mb-4 p-3 rounded-lg font-bold text-lg text-center bg-red-200 text-red-800 border-2 border-red-500';
                    }
                }
            } else {
                submitBtn.classList.remove('hidden');
                submitBtn.disabled = selectedAnswers.length !== correctAnswersCount; 
                nextBtn.classList.add('hidden');
            }

            nextBtn.innerHTML = 'Next <i class="fa-solid fa-arrow-right ml-2"></i>';
            nextBtn.className = "px-6 py-2 rounded-lg bg-slate-800 text-white hover:bg-slate-900 transition-colors hidden";
            prevBtn.disabled = index === 0;
            
            if(!paletteModal.classList.contains('hidden')){
                renderPaletteGrid();
            }
        }

        function toggleOption(letter, isMultiple, cardElement) {
            if (isAnswered) return;

            const q = questionsData[displayOrder[currentIndex]];
            const correctAnswersCount = q.answer.split(',').filter(s => s.trim() !== '' && s.trim() !== '—').length;
            const indicator = cardElement.querySelector('.option-indicator > div');
            
            if (isMultiple) {
                if (selectedAnswers.includes(letter)) {
                    selectedAnswers = selectedAnswers.filter(a => a !== letter);
                    cardElement.classList.remove('selected');
                    indicator.classList.add('hidden');
                } else {
                    if (selectedAnswers.length < correctAnswersCount) {
                        selectedAnswers.push(letter);
                        cardElement.classList.add('selected');
                        indicator.classList.remove('hidden');
                    } else {
                        return; // 達到上限
                    }
                }
            } else {
                selectedAnswers = [letter];
                document.querySelectorAll('.option-card').forEach(el => {
                    el.classList.remove('selected');
                    el.querySelector('.option-indicator > div').classList.add('hidden');
                });
                cardElement.classList.add('selected');
                indicator.classList.remove('hidden');
            }
            
            submitBtn.disabled = selectedAnswers.length !== correctAnswersCount;
            saveProgress(); // 選項改變時儲存狀態
        }

        function submitAnswer() {
            blurFocus();
            isAnswered = true;
            const q = questionsData[displayOrder[currentIndex]];
            const correctAnswers = q.answer.split(',').map(s => s.trim());

            const isCorrect = correctAnswers.length === selectedAnswers.length && 
                              correctAnswers.every(val => selectedAnswers.includes(val));
            
            quizResults[q.id] = isCorrect;
            updateStats();
            saveProgress();

            const optionCards = document.querySelectorAll('.option-card');
            optionCards.forEach((card) => {
                const letter = card.getAttribute('data-letter');
                const indicator = card.querySelector('.option-indicator');
                
                card.classList.add('disabled-click');
                
                if (correctAnswers.includes(letter)) {
                    card.classList.add('correct-answer');
                    indicator.innerHTML = '<i class="fa-solid fa-check text-green-600"></i>';
                    indicator.classList.remove('border-slate-300');
                    indicator.classList.add('border-green-500');
                } else if (selectedAnswers.includes(letter)) {
                    card.classList.add('wrong-answer');
                    indicator.innerHTML = '<i class="fa-solid fa-xmark text-red-600"></i>';
                    indicator.classList.remove('border-slate-300');
                    indicator.classList.add('border-red-500');
                }
            });

            const yourAns = document.getElementById('your-answer-display');
            if (yourAns) {
                yourAns.textContent = selectedAnswers.length ? selectedAnswers.sort().join(', ') : '(none)';
                yourAns.className = 'font-semibold ' + (isCorrect ? 'text-green-700' : 'text-red-700');
            }

            const banner = document.getElementById('result-banner');
            if (banner) {
                if (isCorrect) {
                    banner.innerHTML = '<i class="fa-solid fa-circle-check mr-2"></i> 答對! Correct!';
                    banner.className = 'mb-4 p-3 rounded-lg font-bold text-lg text-center bg-green-200 text-green-800 border-2 border-green-500';
                } else {
                    banner.innerHTML = '<i class="fa-solid fa-circle-xmark mr-2"></i> 答錯! Incorrect';
                    banner.className = 'mb-4 p-3 rounded-lg font-bold text-lg text-center bg-red-200 text-red-800 border-2 border-red-500';
                }
            }

            document.getElementById('explanation-area').classList.remove('hidden');
            submitBtn.classList.add('hidden');
            nextBtn.classList.remove('hidden');
            
            if (currentIndex === questionsData.length - 1) {
                nextBtn.innerHTML = 'View Results <i class="fa-solid fa-chart-pie ml-2"></i>';
                nextBtn.classList.remove('bg-slate-800', 'hover:bg-slate-900');
                nextBtn.classList.add('bg-indigo-600', 'hover:bg-indigo-700');
            }

            setTimeout(() => {
                document.getElementById('explanation-area').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        function nextQuestion() {
            blurFocus();
            if (currentIndex < questionsData.length - 1) {
                currentIndex++;
                saveProgress();
                renderQuestion(currentIndex);
            } else {
                showResults();
            }
        }

        function prevQuestion() {
            blurFocus();
            if (currentIndex > 0) {
                currentIndex--;
                saveProgress();
                renderQuestion(currentIndex);
            }
        }

        function showResults() {
            const total = questionsData.length;
            const correctCount = Object.values(quizResults).filter(r => r === true).length;
            const answeredCount = Object.keys(quizResults).length;
            const percentage = answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0;
            
            let message = "";
            let colorClass = "";
            let icon = "";

            if (percentage === 100) {
                message = "Perfect! You are ready for the exam!";
                colorClass = "text-green-600";
                icon = "fa-trophy";
            } else if (percentage >= 80) {
                message = "Great job! Excellent score.";
                colorClass = "text-blue-600";
                icon = "fa-thumbs-up";
            } else if (percentage >= 60) {
                message = "Not bad, keep it up!";
                colorClass = "text-yellow-600";
                icon = "fa-star-half-stroke";
            } else {
                message = "Don't be discouraged, keep practicing!";
                colorClass = "text-red-600";
                icon = "fa-book-open-reader";
            }

            quizContent.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full py-10 fade-in">
                    <div class="w-24 h-24 rounded-full bg-slate-100 flex items-center justify-center mb-6">
                        <i class="fa-solid ${icon} text-5xl ${colorClass}"></i>
                    </div>
                    
                    <h2 class="text-3xl font-bold text-slate-800 mb-2">Quiz Completed</h2>
                    
                    <div class="grid grid-cols-4 gap-4 w-full max-w-2xl mb-8 mt-6">
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 text-center">
                            <div class="text-slate-400 text-xs uppercase font-bold tracking-wider mb-1">Total</div>
                            <div class="text-2xl font-bold text-slate-800">${total}</div>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 text-center">
                            <div class="text-slate-400 text-xs uppercase font-bold tracking-wider mb-1">Answered</div>
                            <div class="text-2xl font-bold text-slate-800">${answeredCount}</div>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 text-center">
                            <div class="text-slate-400 text-xs uppercase font-bold tracking-wider mb-1">Correct</div>
                            <div class="text-2xl font-bold text-green-600">${correctCount}</div>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 text-center">
                            <div class="text-slate-400 text-xs uppercase font-bold tracking-wider mb-1">Accuracy</div>
                            <div class="text-2xl font-bold ${colorClass}">${percentage}%</div>
                        </div>
                    </div>

                    <div class="bg-slate-50 border-l-4 border-slate-300 p-4 w-full max-w-lg mb-8 rounded-r text-slate-700 italic text-center">
                        "${message}"
                    </div>

                    <button onclick="restartQuiz()" class="px-8 py-3 rounded-full bg-slate-900 text-white font-bold hover:bg-slate-800 hover:scale-105 transition-all shadow-lg">
                        <i class="fa-solid fa-rotate-right mr-2"></i> Restart Quiz
                    </button>
                </div>
            `;

            footerControls.classList.add('hidden');
            progressBar.style.width = '100%';
        }

        function restartQuiz() {
            blurFocus();
            currentIndex = 0;
            quizResults = {};
            selectedAnswers = [];
            isAnswered = false;
            // 這裡不再呼叫 flaggedQuestions.clear()，所以標記會被保留下來
            progressBar.style.width = '0%';
            
            // 清空除標記以外的 LocalStorage 進度並重存
            saveProgress();
            
            updateStats();
            renderQuestion(currentIndex);
        }

        function updateProgress() {
            const pct = ((currentIndex + 1) / questionsData.length) * 100;
            progressBar.style.width = `${pct}%`;
            currentProgress.innerText = `Question ${currentIndex + 1}`;
        }

        // Palette Functions
        function togglePalette() {
            blurFocus();
            const isHidden = paletteModal.classList.contains('hidden');
            if (isHidden) {
                paletteModal.classList.remove('hidden');
                void palettePanel.offsetWidth;
                paletteBackdrop.classList.remove('opacity-0');
                palettePanel.classList.remove('translate-x-full');
                renderPaletteGrid();
            } else {
                paletteBackdrop.classList.add('opacity-0');
                palettePanel.classList.add('translate-x-full');
                setTimeout(() => {
                    paletteModal.classList.add('hidden');
                }, 300);
            }
        }

        function renderPaletteGrid() {
            paletteGrid.innerHTML = '';
            questionsData.forEach((q, index) => {
                const el = document.createElement('div');
                el.className = 'palette-item';
                el.innerText = q.id;
                
                let statusClass = 'neutral';
                if (index === currentIndex) {
                    statusClass = 'current';
                } else if (quizResults.hasOwnProperty(q.id)) {
                    statusClass = quizResults[q.id] ? 'correct' : 'wrong';
                }

                el.classList.add(statusClass);
                
                if (flaggedQuestions.has(q.id)) el.classList.add('flagged');

                el.onclick = () => {
                    currentIndex = index;
                    saveProgress();
                    renderQuestion(index);
                    togglePalette();
                };
                
                paletteGrid.appendChild(el);
            });
        }
    </script>
</body>
</html>

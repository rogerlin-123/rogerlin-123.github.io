<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Fortinet FCSS Enterprise Firewall 7.6 Practice Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .highlight { background-color: #fef08a; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Custom Checkbox/Radio Styles */
        .option-card { cursor: pointer; transition: all 0.2s; }
        .option-card:hover { background-color: #f1f5f9; }
        .option-card.selected { border-color: #3b82f6; background-color: #eff6ff; ring: 2px solid #3b82f6; }
        
        .option-card.correct-answer { border-color: #22c55e; background-color: #f0fdf4; }
        .option-card.wrong-answer { border-color: #ef4444; background-color: #fef2f2; }
        
        .disabled-click { pointer-events: none; opacity: 0.9; }

        /* Palette Styles */
        .palette-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            font-weight: 600;
            border-radius: 0.5rem;
            border-width: 2px;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }
        .palette-item:hover { transform: scale(1.05); }
        .palette-item.current { border-color: #3b82f6; background-color: #eff6ff; color: #1d4ed8; }
        .palette-item.correct { border-color: #22c55e; background-color: #f0fdf4; color: #15803d; }
        .palette-item.wrong { border-color: #ef4444; background-color: #fef2f2; color: #b91c1c; }
        .palette-item.neutral { border-color: #e2e8f0; background-color: #f8fafc; color: #64748b; }
        .palette-item.neutral:hover { border-color: #cbd5e1; }
        
        /* 標記 (Flag) 小紅旗樣式 */
        .palette-item.flagged::after {
            content: '\f024'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
            position: absolute; top: -5px; right: -5px; color: #ef4444; font-size: 0.75rem;
            background: white; border-radius: 50%; padding: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        
        /* 鍵盤提示標籤樣式 */
        kbd {
            display: inline-block; padding: 0.1rem 0.4rem; font-size: 0.75rem; 
            font-weight: 700; background-color: #ffffff; border: 1px solid #cbd5e1; 
            border-radius: 0.25rem; color: #475569; box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen flex flex-col overflow-x-hidden">

    <nav class="sticky top-0 z-50 bg-slate-900 text-white shadow-lg">

    <main class="flex-grow w-full max-w-7xl mx-auto flex flex-col lg:flex-row items-start justify-center pt-8 pb-20 px-4 gap-6">
        
        <aside class="w-full lg:w-64 flex-shrink-0 bg-white rounded-2xl shadow-xl border-t-4 border-slate-900 sticky top-24 z-10 flex flex-col overflow-hidden">

            <div class="p-4 flex flex-col gap-3 flex-grow">

                <div class="flex gap-2">

                    <button onclick="toggleFlag()" id="btn-flag" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded text-sm transition-colors shadow-sm flex items-center gap-1">

                    <button onclick="prevFlag()" class="bg-purple-600 hover:bg-purple-700 text-white px-3 py-1.5 rounded text-sm transition-colors shadow-sm flex items-center gap-1">
                        <i class="fa-solid fa-caret-left"></i> <span class="hidden sm:inline">尋找標記</span>
                    </button>
                    <button onclick="nextFlag()" class="bg-purple-600 hover:bg-purple-700 text-white px-3 py-1.5 rounded text-sm transition-colors shadow-sm flex items-center gap-1">

            <div class="w-full bg-slate-200 h-1.5">

            <div id="quiz-content" class="p-6 md:p-8 flex-grow flex flex-col">
                </div>

            <div id="footer-controls" class="bg-slate-50 border-t border-slate-200 p-4 md:p-6 flex justify-between items-center">
                <button id="prev-btn" onclick="prevQuestion()" class="px-5 py-2 rounded-lg border border-slate-300 text-slate-600 hover:bg-white hover:text-slate-900 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fa-solid fa-arrow-left mr-2"></i> <span class="hidden sm:inline">Previous</span>
                </button>

                <div class="flex gap-3">
                    <button id="submit-btn" onclick="submitAnswer()" class="px-6 py-2 rounded-lg bg-blue-600 text-white font-bold hover:bg-blue-700 shadow-md transition-transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed">
                        Submit Answer <span class="ml-2 text-blue-200 text-xs font-normal border border-blue-400 rounded px-1 hidden sm:inline">Enter</span>
                    </button>
                    <button id="next-btn" onclick="nextQuestion()" class="px-6 py-2 rounded-lg bg-slate-800 text-white hover:bg-slate-900 transition-colors hidden">
                        <span class="hidden sm:inline">Next</span> <i class="fa-solid fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </div>

    </main>

    <div id="palette-modal" class="fixed inset-0 z-[60] hidden">

    <script>
        // ==========================================
        // 【請在此處貼上你原本完整的 65 題 questionsData 陣列】
        // 為了避免 Token 限制，此處僅放一題作為格式示意，請把這段換成你完整的資料。
        // ==========================================
        const questionsData = [
            {
                id: 1,
                q_en: "Refer to the exhibit. The partial output of an OSPF command is shown. You are checking the OSPF status of a FortiGate device when you receive the output shown in the exhibit. Based on the output, which two statements about FortiGate are correct? (Choose two)",
                options: [
                    "A. FortiGate is a backup designated router.",
                    "B. FortiGate supports OSPF ECMP.",
                    "C. FortiGate is in the area 0.0.0.5.",
                    "D. FortiGate can inject external routing information."
                ],
                answer: "B, D",
                explanation: "Injecting External Information (Option D): The last line of the exhibit explicitly states, 'This router is an ASBR'. An ASBR connects OSPF to another domain and injects external routes. OSPF ECMP Support (Option B): The output indicates 'Conforms to RFC2328', which supports ECMP."
            },
            {
                id: 2,
                q_en: "Refer to the exhibit, which shows a physical topology and a traffic log. The administrator is checking on FortiAnalyzer traffic from the device with IP address 10.1.10.1, located behind the FortiGate ISFW device. The firewall policy in on the ISFW device does not have UTM enabled and the administrator is surprised to see a log with the action Malware. What are two reasons FortiAnalyzer would display this log?  (Choose two)",
                options: [
                    "A. Security rating is enabled in ISFW.",
                    "B. The firewall policy in NGFW-1 has UTM enabled.",
                    "C. ISFW is not connected to FortiAnalyzer and must go through NGFW-1.",
                    "D. ISFW is in a Security Fabric environment."
                ],
                answer: "B, D",
                explanation: "ISFW is part of a Security Fabric (Option D) and shares logs. NGFW-1 has UTM enabled (Option B) and detects the malware upstream, which is correlated in FortiAnalyzer."
            },
            {
                id: 3,
                q_en: "Refer to the exhibit, which shows the ADVPN IPsec interface representing the VPN IPsec phase 1 from Hub A to Spoke 1 and Spoke 2, and from Hub B to Spoke 3 and Spoke 4. An administrator must configure an ADVPN using IBGP and EBGP to connect overlay network 1 with 2.\n\nWhat must the administrator configure in the phase 1 VPN IPsec configuration of the ADVPN tunnels?",
                options: [
                    "A. set auto-discovery-sender enable and set network-id x",
                    "B. set auto-discovery-forwarder enable and set remote-as x",
                    "C. set auto-discovery-crossover enable and set enforce-multihop enable",
                    "D. set auto-discovery-receiver enable and set npu-offload enable"
                ],
                answer: "A",
                explanation: "Setting auto-discovery-sender enable and specifying a network-id allows the tunnels to properly identify and route the ADVPN overlay networks."
            },
            {
                id: 4,
                q_en: "Refer to the exhibit. An HA configuration of an active-active (A-A) cluster with the same HA uptime is shown. You want HQ-NGFW-2 to handle the Core2 VDOM traffic. Which modification must you make to achieve this outcome?",
                options: [
                    "A. Reboot HQ-NGFW-2.",
                    "B. Change the priority from 100 to 160 for HQ-NGFW-2.",
                    "C. Change the priority from 120 to 200 for HQ-NGFW-2.",
                    "D. Enable override in virtual cluster 2 for HQ-NGFW-2."
                ],
                answer: "C",
                explanation: "Priority determines the primary unit when uptime is same. HQ-NGFW-1 has priority 150 for Core2. HQ-NGFW-2 (currently 120) needs a higher priority than 150. Option C sets it to 200."
            },
            {
                id: 5,
                q_en: "What is the initial step performed by FortiGate when handling the first packets of a session?",
                options: [
                    "A. Installation of the session key in the network processor (NP)",
                    "B. Data encryption and decryption",
                    "C. Security inspections such as ACL, HPE, and IP integrity header checking",
                    "D. Offloading the packets directly to the content processor (CP)"
                ],
                answer: "C",
                explanation: "The first steps involve DoS checks, ACLs, HPE, and header integrity checks before session creation or offloading."
            },
            {
                id: 6,
                q_en: "Refer to the exhibit, which shows a partial troubleshooting command output. An administrator is extensively using IPsec on FortiGate. Many tunnels show information similar to the output shown in the exhibit.\n\nWhat can the administrator conclude?",
                options: [
                    "A. IPsec SAs cannot be offloaded.",
                    "B. The two IPsec SAs, inbound and outbound, are copied to the NPU.",
                    "C. Only the outbound IPsec SA is copied to the NPU.",
                    "D. Only the inbound IPsec SA is copied to the NPU."
                ],
                answer: "A",
                explanation: "npu_flag=20 (hex 0x20) indicates the SA is NOT offloaded to the NPU, often due to unsupported algorithms."
            },
            {
                id: 7,
                q_en: "A vulnerability scan report has revealed that a user has generated traffic to the website example.com (10.10.10.10) using a weak SSL/TLS version supported by the HTTPS web server.\n\nWhat can the firewall administrator do to block all outdated SSL/TLS versions on any HTTPS web server to prevent possible attacks on user traffic?",
                options: [
                    "A. Configure the unsupported SSL version and set the minimum allowed SSL version in the HTTPS settings of the SSL/SSH inspection profile.",
                    "B. Enable auto-detection of outdated SSL/TLS versions in the SSL/SSH inspection profile to block vulnerable websites.",
                    "C. Install the required certificate in the client's browser or use Active Directory policies to block specific websites as defined in the SSL/SSH inspection profile.",
                    "D. Use the latest certificate, Fortinet_SSL_ECDSA256, and replace the CA certificate in the SSL/SSH inspection profile."
                ],
                answer: "A",
                explanation: "Setting the minimum allowed SSL/TLS version in the SSL/SSH inspection profile forces clients to use secure versions or get blocked."
            },
            {
                id: 8,
                q_en: "The IT department discovered during the last network migration that all zero phase selectors in phase 2 IPsec configurations impacted network operations. What are two valid approaches to prevent this during future migrations? (Choose two)",
                options: [
                    "A. Use routing protocols to specify allowed subnets over the tunnel.",
                    "B. Configure an IPsec-aggregate to create redundancy between each firewall peer.",
                    "C. Clearly indicate to the VPN which segments will be encrypted in the phase two selectors.",
                    "D. Configure an IP address on the IPsec interface of each firewall to establish unique peer connections and avoid impacting network operations."
                ],
                answer: "A, C",
                explanation: "Using routing protocols (A) controls advertisements. Specific Phase 2 selectors (C) restrict what traffic enters the tunnel."
            },
            {
                id: 9,
                q_en: "Refer to the exhibits. The configuration of a user's Windows PC, which has a default MTU of 1500 bytes, along with FortiGate interfaces set to an MTU of 1000 bytes, and the results of PC1 pinging server 172.16.0.254 are shown. Why is the user in Windows PC1 unable to ping server 172.16.0.254 and is seeing the message: Packet needs to be fragmented but DF set?",
                options: [
                    "A. Option ip.flags.mf must be set to enable on FortiGate. The user has to adjust the ping MTU to 1000 to succeed.",
                    "B. Fragmented packets must be encrypted. To connect any application successfully, the user must install the Fortinet_CA certificate in the Microsoft Management Console.",
                    "C. FortiGate honors the do not fragment bit and the packets are dropped. The user has to adjust the ping MTU to 972 to succeed.",
                    "D. The user must trigger different traffic because path MTU discovery techniques do not recognize ICMP payloads."
                ],
                answer: "C",
                explanation: "The DF (Don't Fragment) bit prevents the router from fragmenting the packet to fit the smaller MTU (1000). The packet is dropped. The user must lower the packet size manually."
            },
            {
                id: 10,
                q_en: "A company's guest internet policy, operating in proxy mode, blocks access to Artificial Intelligence Technology sites using FortiGuard. However, a guest user accessed a page in this category using port 8443.\n\nWhich configuration changes are required for FortiGate to analyze HTTPS traffic on nonstandard ports like 8443 when full SSL inspection is active in the guest policy?",
                options: [
                    "A. Add a URL wildcard domain to the website CA certificate and use it in the SSL/SSH Inspection Profile.",
                    "B. In the Protocol Port Mapping section of the SSL/SSH Inspection Profile, enter 443, 8443 to analyze both standard (443) and non-standard (8443) HTTPS ports.",
                    "C. To analyze nonstandard ports in web filter profiles, use TLSv1.3 in the SSL/SSH Inspection Profile.",
                    "D. Administrators can block traffic on nonstandard ports by enabling the SNI check in the SSL/SSH Inspection Profile."
                ],
                answer: "B",
                explanation: "Proxy-based inspection defaults to standard ports. Non-standard ports must be explicitly added in Protocol Port Mapping."
            },
            {
                id: 11,
                q_en: "Refer to the exhibit. An administrator is deploying a hub and spokes network and using OSPF as dynamic protocol.\n\nWhich configuration is mandatory for neighbor adjacency?",
                options: [
                    "A. Set bfd enable in the router configuration",
                    "B. Set network-type point-to-multipoint in the hub interface",
                    "C. Set rfc1583-compatible enable in the router configuration",
                    "D. Set virtual-link enable in the hub interface"
                ],
                answer: "B",
                explanation: "In OSPF over IPsec VPN (hub-and-spoke), 'point-to-multipoint' is required to allow multiple neighbors on the same interface without DR/BDR election issues."
            },
            {
                id: 12,
                q_en: "An administrator wants to scale the IBGP sessions and optimize the routing table in an IBGP network. Which parameter should the administrator configure?",
                options: [
                    "A. network-import-check",
                    "B. ibgp-enforce-multihop",
                    "C. neighbor-group",
                    "D. route-reflector-client"
                ],
                answer: "D",
                explanation: "Route Reflectors (route-reflector-client) eliminate the need for a full-mesh IBGP topology, scaling the network."
            },
            {
                id: 13,
                q_en: "A company that acquired multiple branches across different countries needs to install new FortiGate devices on each of those branches. However, the IT staff lacks sufficient knowledge to implement the initial configuration on the FortiGate devices.\n\nWhich three approaches can the company take to successfully deploy advanced initial configurations on remote branches? (Choose three)",
                options: [
                    "A. Use metadata variables to dynamically assign values according to each FortiGate device.",
                    "B. Use provisioning templates and install configuration settings at the device layer.",
                    "C. Use the Global ADOM to deploy global object configurations to each FortiGate device.",
                    "D. Apply Jinja in the FortiManager scripts for large-scale and advanced deployments.",
                    "E. Add FortiGate devices on FortiManager as model devices, and use ZTP or LTP to connect to FortiGate devices."
                ],
                answer: "A, D, E",
                explanation: "Metadata (A) for device-specific values. Jinja scripts (D) for large-scale and advanced deployments. Model devices + ZTP (E) for zero-touch deployment."
            },
            {
                id: 14,
                q_en: "Refer to the exhibit. The routing tables of FortiGate_A and FortiGate_B are shown. FortiGate_A and FortiGate_B are in the same autonomous system. The administrator wants to dynamically add only route 172.16.1.248/30 on FortiGate_A. What must the administrator configure?",
                options: [
                    "A. The prefix 172.16.1.248/30 in the BGP Networks section on FortiGate_B",
                    "B. A BGP route map out for 172.16.1.248/30 on FortiGate_B",
                    "C. Enable Redistribute Connected in the BGP section on FortiGate_B.",
                    "D. A BGP route map in for 172.16.1.248/30 on FortiGate_A"
                ],
                answer: "A",
                explanation: "Adding the prefix to the BGP Networks section on FortiGate_B is the standard way to advertise it dynamically into the BGP table without using complex route maps."
            },
            {
                id: 15,
                q_en: "Refer to the exhibit, which shows an enterprise network connected to an internet service provider. The administrator must configure the BGP section of FortiGate A to give internet access to the enterprise network.\n\nWhich command must the administrator use to establish a connection with the internet service provider?",
                options: [
                    "A. config neighbor",
                    "B. config redistribute bgp",
                    "C. config router route-map",
                    "D. config redistribute ospf"
                ],
                answer: "A",
                explanation: "'config neighbor' is the fundamental command to define the BGP peer (ISP) IP and AS number."
            },
            {
                id: 16,
                q_en: "What action can be taken on a FortiGate to block traffic using IPS protocol decoders, focusing on network transmission patterns and application signatures?",
                options: [
                    "A. Use the DNS filter to block application signatures and protocol decoders.",
                    "B. Use application control to limit non-URL-based software handling.",
                    "C. Enable application detection-based SD-WAN rules.",
                    "D. Configure a web filter profile in flow mode."
                ],
                answer: "B",
                explanation: "Application Control uses IPS protocol decoders to identify and control applications (non-URL based) via signatures."
            },

        // ==========================================

        // Core Logic
        let currentIndex = 0;
        let selectedAnswers = []; // Store selected options ["A", "B"]
        let isAnswered = false;
        let quizResults = {}; // Store correctness per question: { 1: true, 2: false }
        let flaggedQuestions = new Set(); // 儲存被標記的題目 ID

        const quizContent = document.getElementById('quiz-content');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const submitBtn = document.getElementById('submit-btn');
        const progressBar = document.getElementById('progress-bar');
        const currentProgress = document.getElementById('current-progress');
        const totalCount = document.getElementById('total-count');
        const footerControls = document.getElementById('footer-controls');

        // Palette Logic
        const paletteModal = document.getElementById('palette-modal');
        const paletteBackdrop = document.getElementById('palette-backdrop');
        const palettePanel = document.getElementById('palette-panel');
        const paletteGrid = document.getElementById('palette-grid');

        // ==== 鍵盤事件監聽 (快捷鍵實作) ====
        document.addEventListener('keydown', (e) => {
            // 避免在輸入框中觸發
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            // 1-5 數字鍵選擇選項 A-E
            // const keyMap = {'1': 'A', '2': 'B', '3': 'C', '4': 'D', '5': 'E', '6': 'F'};
            const keyMap = {'1': 'A', '2': 'B', '3': 'C', '4': 'D', '5': 'E'};
            if (keyMap[e.key] && !isAnswered) {
                const optionIndex = e.key.charCodeAt(0) - 49; // '1' -> 0
                const cards = document.querySelectorAll('.option-card');
                if (cards[optionIndex]) {
                    const currentQ = questionsData[currentIndex];
                    const isMultiple = currentQ.answer.includes(',');
                    toggleOption(keyMap[e.key], isMultiple, cards[optionIndex]);
                }
            }

            // 左方向鍵: 上一題
            if (e.key === 'ArrowLeft') {
                prevQuestion();
            }
            
            // 右方向鍵: 下一題
            if (e.key === 'ArrowRight') {
                nextQuestion();
            }

            // Enter 鍵: 提交或下一題
            if (e.key === 'Enter') {
                // 若已經答完且在看結果頁面，Enter 也可以觸發 restart (可選)
                if (document.getElementById('result-banner') && !document.getElementById('result-banner').classList.contains('hidden') && currentIndex === questionsData.length) return; 

                if (!isAnswered && selectedAnswers.length > 0) {
                    submitAnswer();
                } else if (isAnswered || selectedAnswers.length === 0) {
                    nextQuestion();
                }
            }

            // M 鍵: 標記/取消標記本題
            if (e.key.toLowerCase() === 'm') {
                toggleFlag();
            }

            // N 鍵: 清除本題進度
              if (e.key.toLowerCase() === 'n') {
                clearCurrentQuestion();
            }
            
        });

        // Init
        document.addEventListener("DOMContentLoaded", () => {
            totalCount.innerText = questionsData.length + " Questions";
            updateStats();
            renderQuestion(currentIndex);
        });

        // 標記本題 (Flag)
        function toggleFlag() {
            const currentQId = questionsData[currentIndex].id;
            const btnFlag = document.getElementById('btn-flag');
            
            if (flaggedQuestions.has(currentQId)) {
                flaggedQuestions.delete(currentQId);
                btnFlag.classList.replace('bg-red-700', 'bg-red-500');
                btnFlag.innerHTML = '<i class="fa-regular fa-flag"></i> <span class="hidden sm:inline">標記本題</span>';
            } else {
                flaggedQuestions.add(currentQId);
                btnFlag.classList.replace('bg-red-500', 'bg-red-700');
                btnFlag.innerHTML = '<i class="fa-solid fa-flag"></i> <span class="hidden sm:inline">取消標記</span>';
            }
            
            updateStats();
            if (!paletteModal.classList.contains('hidden')) renderPaletteGrid();
        }

        // 尋找下一個標記
        function nextFlag() {
            if (flaggedQuestions.size === 0) { alert('目前沒有任何標記的題目。'); return; }
            for (let pos = currentIndex + 1; pos < questionsData.length; pos++) {
                if (flaggedQuestions.has(questionsData[pos].id)) {
                    currentIndex = pos;
                    renderQuestion(currentIndex);
                    return;
                }
            }
            // 若後面沒有，循環找最前面的
            for (let pos = 0; pos <= currentIndex; pos++) {
                if (flaggedQuestions.has(questionsData[pos].id)) {
                    currentIndex = pos;
                    renderQuestion(currentIndex);
                    return;
                }
            }
        }

        // 尋找上一個標記
        function prevFlag() {
            if (flaggedQuestions.size === 0) { alert('目前沒有任何標記的題目。'); return; }
            for (let pos = currentIndex - 1; pos >= 0; pos--) {
                if (flaggedQuestions.has(questionsData[pos].id)) {
                    currentIndex = pos;
                    renderQuestion(currentIndex);
                    return;
                }
            }
            // 若前面沒有，找最後面的
            for (let pos = questionsData.length - 1; pos >= currentIndex; pos--) {
                if (flaggedQuestions.has(questionsData[pos].id)) {
                    currentIndex = pos;
                    renderQuestion(currentIndex);
                    return;
                }
            }
        }

        // 清除本題進度
        function clearCurrentQuestion() {
            const currentQId = questionsData[currentIndex].id;
            delete quizResults[currentQId];
            selectedAnswers = [];
            isAnswered = false;
            updateStats();
            renderQuestion(currentIndex);
        }

        // 更新左側統計數據
        function updateStats() {
            const total = questionsData.length;
            const answeredCount = Object.keys(quizResults).length;
            const correctCount = Object.values(quizResults).filter(r => r === true).length;
            const flaggedCount = flaggedQuestions.size;
            const percentage = answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0;

            document.getElementById('stat-progress').innerText = `${answeredCount} / ${total}`;
            document.getElementById('stat-flagged').innerText = flaggedCount;
            document.getElementById('stat-correct').innerText = correctCount;
            document.getElementById('stat-accuracy').innerText = `${percentage}%`;
        }

        function renderQuestion(index) {
            const q = questionsData[index];
            
            // 初始化狀態
            isAnswered = quizResults.hasOwnProperty(q.id);
            if (!isAnswered) selectedAnswers = []; 

            // 更新標記按鈕 UI
            const btnFlag = document.getElementById('btn-flag');
            if (flaggedQuestions.has(q.id)) {
                btnFlag.classList.replace('bg-red-500', 'bg-red-700');
                btnFlag.innerHTML = '<i class="fa-solid fa-flag"></i> <span class="hidden sm:inline">取消標記</span>';
            } else {
                btnFlag.classList.replace('bg-red-700', 'bg-red-500');
                btnFlag.innerHTML = '<i class="fa-regular fa-flag"></i> <span class="hidden sm:inline">標記本題</span>';
            }

            document.getElementById('q-id-display').innerText = `第 ${index + 1} 題 (ID: Q${q.id})`;
            
            // Image Logic
            const paddedId = String(q.id).padStart(2, '0');
            const imgFilename = `png/q${paddedId}.png`;
            const hasExhibit = q.q_en.toLowerCase().includes("exhibit") || q.q_en.toLowerCase().includes("refer to");

            let exhibitHtml = `
                <div class="my-6 flex flex-col items-center justify-center">
                     <img src="${imgFilename}" 
                          alt="Exhibit for Question ${q.id}" 
                          class="max-w-full h-auto rounded-lg border border-slate-300 shadow-sm transition-opacity duration-300"
                          style="display: none;"
                          onload="this.style.display='block'"
                          onerror="this.style.display='none'; ${hasExhibit ? `document.getElementById('placeholder-${q.id}').classList.remove('hidden');` : ''}"
                     >
                     ${hasExhibit ? `
                     <div id="placeholder-${q.id}" class="hidden w-full bg-slate-50 border-2 border-dashed border-slate-300 rounded-lg h-32 flex flex-col items-center justify-center text-slate-400">
                         <i class="fa-regular fa-image text-3xl mb-2"></i>
                         <span class="text-xs font-semibold">Q${q.id} Exhibit (png/q${paddedId}.png)</span>
                         <span class="text-xs text-center px-2">To view the image, please ensure the file <b>q${paddedId}.png</b> is located in the <b>png</b> folder.</span>
                     </div>
                     ` : ''}
                </div>
            `;

            // Options Logic
            const isMultiple = q.answer.includes(',');
            const typeText = isMultiple ? '<span class="text-xs bg-slate-200 text-slate-600 px-2 py-0.5 rounded ml-2">Multiple Choice</span>' : '';

            let optionsHtml = q.options.map((opt, i) => {
                const letter = String.fromCharCode(65 + i); // 0->A, 1->B
                return `
                <div class="option-card border border-slate-200 rounded-lg p-4 mb-3 flex items-start gap-3" 
                     onclick="toggleOption('${letter}', ${isMultiple}, this)" data-letter="${letter}">
                    <div class="flex-shrink-0 w-6 h-6 rounded-full border-2 border-slate-300 flex items-center justify-center mt-0.5 option-indicator">
                        ${isMultiple ? '<div class="w-3 h-3 rounded-sm bg-blue-500 hidden"></div>' : '<div class="w-3 h-3 rounded-full bg-blue-500 hidden"></div>'}
                    </div>
                    <div class="text-slate-700 text-sm md:text-base leading-relaxed select-none">
                        <span class="font-bold mr-2 text-slate-400">${letter}.</span>${opt.substring(3)}
                    </div>
                </div>`;
            }).join('');

            // Render
            quizContent.innerHTML = `
                <div class="flex justify-between items-start mb-4 fade-in">
                    <span class="bg-slate-800 text-white text-sm font-bold px-3 py-1 rounded">第 ${index + 1} 題</span>
                    ${typeText}
                </div>
                
                <div class="mb-2 fade-in">
                    <p class="font-bold text-slate-800 text-lg md:text-xl mb-3 leading-snug">${q.q_en}</p>
                </div>

                <div class="fade-in">
                    ${exhibitHtml}
                </div>

                <div id="options-container" class="mt-4 mb-6 fade-in">
                    ${optionsHtml}
                </div>

                <div id="explanation-area" class="hidden mt-4 bg-green-50 rounded-lg p-6 border border-green-100 fade-in">
                    <div id="result-banner" class="mb-4 p-3 rounded-lg font-bold text-lg text-center"></div>
                    <div class="flex items-center gap-2 mb-3 flex-wrap">
                        <span class="font-bold text-green-700"><i class="fa-solid fa-check-circle mr-1"></i> Correct Answer:</span>
                        <span class="font-bold text-xl text-green-800">${q.answer}</span>
                        <span class="ml-2 text-sm text-slate-600">| Your answer: <span id="your-answer-display" class="font-semibold">(none)</span></span>
                    </div>
                    <div class="text-sm text-slate-700 space-y-3">
                        <p><span class="font-semibold text-slate-900">Explanation:</span> ${q.explanation}</p>
                    </div>
                </div>
            `;

            // Update UI State
            footerControls.classList.remove('hidden');
            updateProgress();
            
            // 如果這題之前已經答過了，直接顯示結果狀態
            if (isAnswered) {
                document.getElementById('explanation-area').classList.remove('hidden');
                submitBtn.classList.add('hidden');
                nextBtn.classList.remove('hidden');
                // 視覺上鎖死選項
                document.querySelectorAll('.option-card').forEach(card => card.classList.add('disabled-click'));
            } else {
                submitBtn.classList.remove('hidden');
                submitBtn.disabled = true;
                nextBtn.classList.add('hidden');
            }

            nextBtn.innerHTML = 'Next <i class="fa-solid fa-arrow-right ml-2"></i>';
            nextBtn.className = "px-6 py-2 rounded-lg bg-slate-800 text-white hover:bg-slate-900 transition-colors hidden";
            prevBtn.disabled = index === 0;
            
            // Update palette highlight if open
            if(!paletteModal.classList.contains('hidden')){
                renderPaletteGrid();
            }
        }

        function toggleOption(letter, isMultiple, cardElement) {
            if (isAnswered) return;

            const indicator = cardElement.querySelector('.option-indicator > div');
            
            if (isMultiple) {
                if (selectedAnswers.includes(letter)) {
                    selectedAnswers = selectedAnswers.filter(a => a !== letter);
                    cardElement.classList.remove('selected');
                    indicator.classList.add('hidden');
                } else {
                    selectedAnswers.push(letter);
                    cardElement.classList.add('selected');
                    indicator.classList.remove('hidden');
                }
            } else {
                selectedAnswers = [letter];
                document.querySelectorAll('.option-card').forEach(el => {
                    el.classList.remove('selected');
                    el.querySelector('.option-indicator > div').classList.add('hidden');
                });
                cardElement.classList.add('selected');
                indicator.classList.remove('hidden');
            }
            submitBtn.disabled = selectedAnswers.length === 0;
        }

        function submitAnswer() {
            isAnswered = true;
            const q = questionsData[currentIndex];
            const correctAnswers = q.answer.split(',').map(s => s.trim());

            const isCorrect = correctAnswers.length === selectedAnswers.length && 
                              correctAnswers.every(val => selectedAnswers.includes(val));
            
            quizResults[q.id] = isCorrect;
            updateStats();

            // Visual Feedback
            const optionCards = document.querySelectorAll('.option-card');
            optionCards.forEach((card) => {
                const letter = card.getAttribute('data-letter');
                const indicator = card.querySelector('.option-indicator');
                
                card.classList.add('disabled-click');
                
                if (correctAnswers.includes(letter)) {
                    card.classList.add('correct-answer');
                    indicator.innerHTML = '<i class="fa-solid fa-check text-green-600"></i>';
                    indicator.classList.remove('border-slate-300');
                    indicator.classList.add('border-green-500');
                } else if (selectedAnswers.includes(letter)) {
                    card.classList.add('wrong-answer');
                    indicator.innerHTML = '<i class="fa-solid fa-xmark text-red-600"></i>';
                    indicator.classList.remove('border-slate-300');
                    indicator.classList.add('border-red-500');
                }
            });

            // Update Your answer display
            const yourAns = document.getElementById('your-answer-display');
            if (yourAns) {
                yourAns.textContent = selectedAnswers.length ? selectedAnswers.sort().join(', ') : '(none)';
                yourAns.className = 'font-semibold ' + (isCorrect ? 'text-green-700' : 'text-red-700');
            }

            // Update Result Banner
            const banner = document.getElementById('result-banner');
            if (banner) {
                if (isCorrect) {
                    banner.innerHTML = '<i class="fa-solid fa-circle-check mr-2"></i> 答對! Correct!';
                    banner.className = 'mb-4 p-3 rounded-lg font-bold text-lg text-center bg-green-200 text-green-800 border-2 border-green-500';
                } else {
                    banner.innerHTML = '<i class="fa-solid fa-circle-xmark mr-2"></i> 答錯! Incorrect';
                    banner.className = 'mb-4 p-3 rounded-lg font-bold text-lg text-center bg-red-200 text-red-800 border-2 border-red-500';
                }
            }

            document.getElementById('explanation-area').classList.remove('hidden');
            submitBtn.classList.add('hidden');
            nextBtn.classList.remove('hidden');
            
            if (currentIndex === questionsData.length - 1) {
                nextBtn.innerHTML = 'View Results <i class="fa-solid fa-chart-pie ml-2"></i>';
                nextBtn.classList.remove('bg-slate-800', 'hover:bg-slate-900');
                nextBtn.classList.add('bg-indigo-600', 'hover:bg-indigo-700');
            }

            setTimeout(() => {
                document.getElementById('explanation-area').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        function nextQuestion() {
            if (currentIndex < questionsData.length - 1) {
                currentIndex++;
                renderQuestion(currentIndex);
            } else {
                showResults();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion(currentIndex);
            }
        }

            const correctCount = Object.values(quizResults).filter(r => r === true).length;
            const answeredCount = Object.keys(quizResults).length;
            const percentage = answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0;
            
            let message = "";
            let colorClass = "";
            let icon = "";

            if (percentage === 100) {
                message = "Perfect! You are ready for the exam!";
                colorClass = "text-green-600";
                icon = "fa-trophy";
            } else if (percentage >= 80) {
                message = "Great job! Excellent score.";
                colorClass = "text-blue-600";
                icon = "fa-thumbs-up";
            } else if (percentage >= 60) {
                message = "Not bad, keep it up!";
                colorClass = "text-yellow-600";
                icon = "fa-star-half-stroke";
            } else {
                message = "Don't be discouraged, keep practicing!";
                colorClass = "text-red-600";
                icon = "fa-book-open-reader";
            }

            quizContent.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full py-10 fade-in">
                    <div class="w-24 h-24 rounded-full bg-slate-100 flex items-center justify-center mb-6">
                        <i class="fa-solid ${icon} text-5xl ${colorClass}"></i>
                    </div>
                    
                    <h2 class="text-3xl font-bold text-slate-800 mb-2">Quiz Completed</h2>
                    
                    <div class="grid grid-cols-4 gap-4 w-full max-w-2xl mb-8 mt-6">
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 text-center">
                            <div class="text-slate-400 text-xs uppercase font-bold tracking-wider mb-1">Total</div>
                            <div class="text-2xl font-bold text-slate-800">${total}</div>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 text-center">
                            <div class="text-slate-400 text-xs uppercase font-bold tracking-wider mb-1">Answered</div>
                            <div class="text-2xl font-bold text-slate-800">${answeredCount}</div>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 text-center">
                            <div class="text-slate-400 text-xs uppercase font-bold tracking-wider mb-1">Correct</div>
                            <div class="text-2xl font-bold text-green-600">${correctCount}</div>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 text-center">
                            <div class="text-slate-400 text-xs uppercase font-bold tracking-wider mb-1">Accuracy</div>
                            <div class="text-2xl font-bold ${colorClass}">${percentage}%</div>
                        </div>
                    </div>

                    <div class="bg-slate-50 border-l-4 border-slate-300 p-4 w-full max-w-lg mb-8 rounded-r text-slate-700 italic text-center">
                        "${message}"
                    </div>

                    <button onclick="restartQuiz()" class="px-8 py-3 rounded-full bg-slate-900 text-white font-bold hover:bg-slate-800 hover:scale-105 transition-all shadow-lg">
                        <i class="fa-solid fa-rotate-right mr-2"></i> Restart Quiz
                    </button>
                </div>
            `;

            footerControls.classList.add('hidden');
            progressBar.style.width = '100%';
        }

        function restartQuiz() {
            currentIndex = 0;
            quizResults = {};
            selectedAnswers = [];
            flaggedQuestions.clear();
            isAnswered = false;
            progressBar.style.width = '0%';
            updateStats();
            renderQuestion(currentIndex);
        }

        function updateProgress() {
            const pct = ((currentIndex + 1) / questionsData.length) * 100;
            progressBar.style.width = `${pct}%`;
            currentProgress.innerText = `Question ${currentIndex + 1}`;
        }

        // Palette Functions
        function togglePalette() {
            const isHidden = paletteModal.classList.contains('hidden');
            if (isHidden) {
                // Open
                paletteModal.classList.remove('hidden');
                // Force reflow for animation
                void palettePanel.offsetWidth;
                paletteBackdrop.classList.remove('opacity-0');
                palettePanel.classList.remove('translate-x-full');
                renderPaletteGrid();
            } else {
                // Close
                paletteBackdrop.classList.add('opacity-0');
                palettePanel.classList.add('translate-x-full');
                setTimeout(() => {
                    paletteModal.classList.add('hidden');
                }, 300); // Wait for transition
            }
        }

        function renderPaletteGrid() {
            paletteGrid.innerHTML = '';
            questionsData.forEach((q, index) => {
                const el = document.createElement('div');
                el.className = 'palette-item';
                el.innerText = q.id;
                
                // Determine Status
                let statusClass = 'neutral';
                if (index === currentIndex) {
                    statusClass = 'current';
                } else if (quizResults.hasOwnProperty(q.id)) {
                    statusClass = quizResults[q.id] ? 'correct' : 'wrong';
                }

                el.classList.add(statusClass);
                
                // 加上小紅旗
                if (flaggedQuestions.has(q.id)) el.classList.add('flagged');

                el.onclick = () => {
                    currentIndex = index;
                    renderQuestion(index);
                    togglePalette(); // Close sidebar
                };
                
                paletteGrid.appendChild(el);
            });
        }

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SES - 安全加密保險箱</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        #sidebar {
            min-width: 250px;
            max-width: 250px;
            min-height: 100vh;
            background: #212529;
            color: #fff;
            transition: all 0.3s;
        }
        #sidebar .nav-link { color: #adb5bd; }
        #sidebar .nav-link.active { color: #fff; background: #0d6efd; }
        #sidebar .nav-link:hover { color: #fff; }
        .content-area { width: 100%; padding: 20px; }
    </style>
</head>
<body>
    <div class="d-flex">
        <nav id="sidebar" class="p-3">
            <h4 class="text-center mb-4"><i class="bi bi-shield-lock-fill"></i> SES Safe</h4>
            <hr>
            <ul class="nav nav-pills flex-column mb-auto">
                <li class="nav-item">
                    <a href="/" class="nav-link {{ 'active' if request.path == '/' }}">
                        <i class="bi bi-speedometer2 me-2"></i> 儀表板
                    </a>
                </li>
                <li>
                    <a href="/vault" class="nav-link {{ 'active' if request.path == '/vault' }}">
                        <i class="bi bi-safe2 me-2"></i> 保險箱清單
                    </a>
                </li>
                <li>
                    <a href="/settings" class="nav-link {{ 'active' if request.path == '/settings' }}">
                        <i class="bi bi-gear-fill me-2"></i> 系統設定
                    </a>
                </li>
            </ul>
            <hr>
            <div class="dropdown">
                <a href="/logout" class="nav-link text-danger"><i class="bi bi-box-arrow-left me-2"></i> 安全登出</a>
            </div>
        </nav>

        <main class="content-area">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

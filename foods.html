<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食珍藏口袋名單</title>
    <style>
        :root {
            --bg-color: #fbf9f6;
            --card-bg: #ffffff;
            --text-main: #2c2520;
            --text-muted: #70645c;
            --accent-primary: #4a6b5d; /* 鼠尾草綠 */
            --accent-secondary: #d98a6c; /* 溫潤磚橘 */
            --border-color: #e6e1da;
            --shadow: 0 4px 12px rgba(44, 37, 32, 0.05);
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* 頂部功能區 */
        header {
            text-align: center;
            margin-bottom: 25px;
            padding: 15px 0;
            position: relative;
        }

        header h1 {
            font-size: 2rem;
            color: var(--text-main);
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        /* 控制按鈕區 */
        .action-bar {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        .btn-toggle-form {
            background-color: var(--accent-primary);
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(74, 107, 93, 0.2);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-toggle-form:hover {
            background-color: #3b5449;
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(74, 107, 93, 0.25);
        }

        /* 隱藏/顯示表單面板的動畫樣式 */
        .form-panel-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-in-out, opacity 0.3s ease, margin-bottom 0.4s ease;
            opacity: 0;
            margin-bottom: 0;
        }

        .form-panel-container.show {
            max-height: 800px; /* 給予足夠容納表單的高度 */
            opacity: 1;
            margin-bottom: 30px;
        }

        /* 表單滿版卡片樣式 */
        .panel {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 25px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            max-width: 600px;
            margin: 0 auto; /* 置中排版 */
        }

        .panel-title-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent-primary);
            padding-left: 10px;
        }

        .panel-title {
            font-size: 1.2rem;
            color: var(--text-main);
            font-weight: 600;
        }

        .btn-close-form {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.4rem;
            cursor: pointer;
            line-height: 1;
            padding: 0 5px;
        }

        .btn-close-form:hover {
            color: #cc5a5a;
        }

        /* 表單元素 */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            color: var(--text-main);
            background-color: #fafafa;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-primary);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(74, 107, 93, 0.1);
        }

        /* 連結區塊 */
        .links-title-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .btn-add-link {
            background: none;
            border: none;
            color: var(--accent-primary);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .link-row {
            display: grid;
            grid-template-columns: 100px 1fr auto;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }

        .btn-remove-link {
            background: none;
            border: none;
            color: #cc5a5a;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 4px;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: #3b5449;
        }

        .btn-submit:disabled {
            background-color: #a0b0a8;
            cursor: not-allowed;
        }

        /* 列表區篩選器 */
        .filter-bar {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 12px;
            margin-bottom: 25px;
            background: white;
            padding: 12px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }

        @media (max-width: 600px) {
            .filter-bar {
                grid-template-columns: 1fr;
            }
        }

        /* 美食卡片清單 */
        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .food-card {
            background: white;
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;

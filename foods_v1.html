<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食珍藏口袋名單</title>
    <style>
        :root {
            --bg-color: #fbf9f6;
            --card-bg: #ffffff;
            --text-main: #2c2520;
            --text-muted: #70645c;
            --accent-primary: #4a6b5d; /* 鼠尾草綠 */
            --accent-secondary: #d98a6c; /* 溫潤磚橘 */
            --border-color: #e6e1da;
            --shadow: 0 4px 12px rgba(44, 37, 32, 0.05);
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* 頂部標題 */
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        header h1 {
            font-size: 2rem;
            color: var(--text-main);
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* 佈局：左邊表單，右邊列表 */
        .main-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 30px;
        }

        @media (max-width: 850px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        /* 卡片通用樣式 */
        .panel {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 25px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            height: fit-content;
        }

        .panel-title {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--text-main);
            border-left: 4px solid var(--accent-primary);
            padding-left: 10px;
            font-weight: 600;
        }

        /* 表單元素 */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            color: var(--text-main);
            background-color: #fafafa;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-primary);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(74, 107, 93, 0.1);
        }

        /* 動態連結區塊 */
        .links-title-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .btn-add-link {
            background: none;
            border: none;
            color: var(--accent-primary);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-add-link:hover {
            color: var(--text-main);
        }

        .link-row {
            display: grid;
            grid-template-columns: 100px 1fr auto;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }

        .btn-remove-link {
            background: none;
            border: none;
            color: #cc5a5a;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 4px;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: #3b5449;
        }

        .btn-submit:disabled {
            background-color: #a0b0a8;
            cursor: not-allowed;
        }

        /* 右側篩選與列表 */
        .filter-bar {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 12px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .filter-bar {
                grid-template-columns: 1fr;
            }
        }

        /* 美食卡片清單 */
        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .food-card {
            background: white;
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .food-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(44, 37, 32, 0.08);
        }

        .card-header {
            margin-bottom: 12px;
        }

        .card-tags {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        .tag-region {
            background-color: #eef2f0;
            color: var(--accent-primary);
        }

        .tag-category {
            background-color: #fdf2ee;
            color: var(--accent-secondary);
        }

        .food-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .food-address {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 16px;
            display: flex;
            align-items: flex-start;
            gap: 4px;
        }

        .card-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-top: 1px dashed var(--border-color);
            padding-top: 12px;
            margin-top: auto;
        }

        .food-link {
            font-size: 0.8rem;
            padding: 6px 12px;
            background-color: #fafafa;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            text-decoration: none;
            transition: all 0.2s;
            font-weight: 500;
        }

        .food-link:hover {
            background-color: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }

        /* 載入與空狀態 */
        .status-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .spinner {
            border: 3px solid rgba(0,0,0,0.1);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border-left-color: var(--accent-primary);
            animation: spin 1s linear infinite;
            margin: 0 auto 10px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>美食珍藏口袋名單</h1>
        <p>記錄走訪過的美味足跡，同步串接雲端試算表</p>
    </header>

    <div class="main-layout">
        <div class="panel">
            <div class="panel-title">新增收藏美食</div>
            <form id="foodForm">
                <div class="form-group">
                    <label for="region">地區</label>
                    <input type="text" id="region" class="form-control" placeholder="例如：桃園市、台北市" required>
                </div>
                
                <div class="form-group">
                    <label for="category">料理類別</label>
                    <input type="text" id="category" class="form-control" placeholder="例如：日式居酒屋、拉麵、速食" required>
                </div>

                <div class="form-group">
                    <label for="name">店家名稱</label>
                    <input type="text" id="name" class="form-control" placeholder="請輸入店名" required>
                </div>

                <div class="form-group">
                    <label for="address">店家地址</label>
                    <input type="text" id="address" class="form-control" placeholder="請輸入完整地址">
                </div>

                <div class="form-group">
                    <div class="links-title-container">
                        <label>相關連結</label>
                        <button type="button" class="btn-add-link" onclick="addLinkRow()">＋ 增加連結</button>
                    </div>
                    <div id="linksContainer">
                        <div class="link-row">
                            <input type="text" class="form-control link-title" placeholder="名稱(如地圖)" value="Google地圖">
                            <input type="url" class="form-control link-url" placeholder="https://..." required>
                            <button type="button" class="btn-remove-link" onclick="removeLinkRow(this)">×</button>
                        </div>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit">儲存此店家</button>
            </form>
        </div>

        <div>
            <div class="filter-bar">
                <input type="text" id="searchBar" class="form-control" placeholder="🔍 搜尋店名、地址或標籤...">
                <select id="filterRegion" class="form-control" style="width: auto; min-width: 120px;">
                    <option value="">全部地區</option>
                </select>
                <select id="filterCategory" class="form-control" style="width: auto; min-width: 120px;">
                    <option value="">全部類別</option>
                </select>
            </div>

            <div id="foodGrid" class="food-grid">
                </div>
        </div>
    </div>
</div>

<script>
    // 🔗 您的專屬 Google Apps Script Web App API 網址
    const API_URL = 'https://script.google.com/macros/s/AKfycbyjOags62Xw9fJSQJvdVFI7ALVojxfbvfmgdiHVtWfq52uP0CW1of7hUqQBotsaUlIA/exec'; 

    let allFoods = [];

    // 初始載入
    document.addEventListener('DOMContentLoaded', () => {
        fetchFoodList();
        
        // 綁定篩選與搜尋事件
        document.getElementById('searchBar').addEventListener('input', filterAndRender);
        document.getElementById('filterRegion').addEventListener('change', filterAndRender);
        document.getElementById('filterCategory').addEventListener('change', filterAndRender);
        
        // 綁定表單提交
        document.getElementById('foodForm').addEventListener('submit', handleFormSubmit);
    });

    // 獲取美食清單資料
    function fetchFoodList() {
        const grid = document.getElementById('foodGrid');
        grid.innerHTML = '<div class="status-message"><div class="spinner"></div>正在讀取雲端美食清單...</div>';

        fetch(API_URL)
            .then(res => {
                if (!res.ok) throw new Error('網路回應不成功');
                return res.json();
            })
            .then(data => {
                allFoods = data;
                updateFilterOptions();
                filterAndRender();
            })
            .catch(err => {
                console.error('讀取失敗:', err);
                grid.innerHTML = '<div class="status-message" style="color:#cc5a5a;">❌ 無法連線至雲端資料庫。請確認 GAS 部署權限設定為「任何人 (Anyone)」。</div>';
            });
    }

    // 動態新增一組連結輸入框
    function addLinkRow() {
        const container = document.getElementById('linksContainer');
        const row = document.createElement('div');
        row.className = 'link-row';
        row.innerHTML = `
            <input type="text" class="form-control link-title" placeholder="名稱(如官網)">
            <input type="url" class="form-control link-url" placeholder="https://..." required>
            <button type="button" class="btn-remove-link" onclick="removeLinkRow(this)">×</button>
        `;
        container.appendChild(row);
    }

    // 刪除一組連結輸入框
    function removeLinkRow(button) {
        const row = button.parentElement;
        const container = document.getElementById('linksContainer');
        if (container.children.length > 1) {
            row.remove();
        } else {
            alert('請至少保留一組連結欄位！');
        }
    }

    // 處理表單提交（新增資料）
    function handleFormSubmit(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = '正在儲存中...';

        // 收集多組連結資料
        const linkRows = document.querySelectorAll('.link-row');
        const linksArray = [];
        linkRows.forEach(row => {
            const title = row.querySelector('.link-title').value.trim() || '外部連結';
            const url = row.querySelector('.link-url').value.trim();
            if (url) {
                linksArray.push({ title, url });
            }
        });

        // 封裝表單物件 (對應 GAS 接收的欄位屬性名稱)
        const foodData = {
            id: 'food_' + Date.now(),
            region: document.getElementById('region').value.trim(),
            category: document.getElementById('category').value.trim(),
            name: document.getElementById('name').value.trim(),
            address: document.getElementById('address').value.trim(),
            links: linksArray
        };

        // 雲端 API 寫入
        fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors', // 處理 GAS 重新導向不支援 CORS 的標準做法
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(foodData)
        })
        .then(() => {
            alert('美食收藏成功！資料已同步寫入雲端試算表。');
            resetForm();
            fetchFoodList(); // 重新整理清單
        })
        .catch(err => {
            console.error(err);
            alert('儲存失敗，請檢查網路或 API 設定。');
        })
        .finally(() => {
            submitBtn.disabled = false;
            submitBtn.textContent = '儲存此店家';
        });
    }

    // 重設表單與連結欄位
    function resetForm() {
        document.getElementById('foodForm').reset();
        const container = document.getElementById('linksContainer');
        container.innerHTML = `
            <div class="link-row">
                <input type="text" class="form-control link-title" placeholder="名稱(如地圖)" value="Google地圖">
                <input type="url" class="form-control link-url" placeholder="https://..." required>
                <button type="button" class="btn-remove-link" onclick="removeLinkRow(this)">×</button>
            </div>
        `;
    }

    // 更新篩選下拉選單的選項
    function updateFilterOptions() {
        const regions = [...new Set(allFoods.map(item => item.Region).filter(Boolean))];
        const categories = [...new Set(allFoods.map(item => item.Category).filter(Boolean))];

        const regSelect = document.getElementById('filterRegion');
        const catSelect = document.getElementById('filterCategory');

        regSelect.innerHTML = '<option value="">全部地區</option>';
        catSelect.innerHTML = '<option value="">全部類別</option>';

        regions.forEach(r => regSelect.innerHTML += `<option value="${r}">${r}</option>`);
        categories.forEach(c => catSelect.innerHTML += `<option value="${c}">${c}</option>`);
    }

    // 綜合過濾與渲染卡片
    function filterAndRender() {
        const keyword = document.getElementById('searchBar').value.toLowerCase();
        const selectedRegion = document.getElementById('filterRegion').value;
        const selectedCategory = document.getElementById('filterCategory').value;
        const grid = document.getElementById('foodGrid');

        const filtered = allFoods.filter(item => {
            const matchesKeyword = 
                (item.Name && item.Name.toLowerCase().includes(keyword)) ||
                (item.Address && item.Address.toLowerCase().includes(keyword)) ||
                (item.Category && item.Category.toLowerCase().includes(keyword)) ||
                (item.Region && item.Region.toLowerCase().includes(keyword));
            
            const matchesRegion = !selectedRegion || item.Region === selectedRegion;
            const matchesCategory = !selectedCategory || item.Category === selectedCategory;

            return matchesKeyword && matchesRegion && matchesCategory;
        });

        if (filtered.length === 0) {
            grid.innerHTML = '<div class="status-message">🔍 沒有符合篩選條件的美食口袋名單。</div>';
            return;
        }

        grid.innerHTML = filtered.map(item => {
            let linksHtml = '';
            if (item.Links && Array.isArray(item.Links)) {
                linksHtml = item.Links.map(l => 
                    `<a href="${l.url}" target="_blank" class="food-link">🔗 ${l.title || '連結'}</a>`
                ).join('');
            }

            return `
                <div class="food-card">
                    <div class="card-header">
                        <div class="card-tags">
                            <span class="tag tag-region">${item.Region || '未分類地區'}</span>
                            <span class="tag tag-category">${item.Category || '未分類類別'}</span>
                        </div>
                        <div class="food-name">${item.Name}</div>
                    </div>
                    <div>
                        <div class="food-address">📍 ${item.Address || '暫無地址資訊'}</div>
                    </div>
                    <div class="card-links">
                        ${linksHtml || '<span style="color:#b5aeae; font-size:0.8rem;">暫無相關連結</span>'}
                    </div>
                </div>
            `;
        }).join('');
    }
</script>

</body>
</html>

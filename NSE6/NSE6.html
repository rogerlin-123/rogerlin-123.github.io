const questionsData = [
  {
    "id": 1,
    "q_en": "The local OSPF router is unable to establish adjacency with a peer.\nWhich two things should the administrator do to troubleshoot the issue? (Choose two.)",
    "options": [
      "A. Check if there is an active static route to the peer.",
      "B. Check if both peers have an IP address within the same subnet.",
      "C. Check if TCP port 179 is blocked.",
      "D. Check if IP protocol 89 is blocked."
    ],
    "answer": "B, D",
    "explanation": "<p><strong>Q1 正確答案：B, D</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> Troubleshooting Concepts &amp; Routing Protocols</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>要成功建立 OSPF 鄰居關係 (Adjacency)，路由器之間必須滿足特定的先決條件。當遇到無法建立連線時，網管工程師應優先檢查以下兩個關鍵項目：</p>\n<div class=\"h-2\"></div>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 B (Check if both peers have an IP address within the same subnet)：</strong></li>\n</ul>\n<p>    OSPF 在交換 Hello 封包時，會嚴格檢查雙方介面的網路遮罩 (Network Mask) 與網段是否一致（除 Point-to-Point 網路類型外）。如果兩台路由器的介面 IP 不在同一個子網路內，Hello 封包的參數驗證將會失敗，導致 OSPF 狀態無法進入 <code class=\"bg-slate-100 px-1 rounded text-xs\">2-Way</code> 甚至 <code class=\"bg-slate-100 px-1 rounded text-xs\">Full</code> 狀態。這是最基礎且最常見的設定錯誤。</p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 D (Check if IP protocol 89 is blocked)：</strong></li>\n</ul>\n<p>    OSPF 與 BGP 不同，它並不依賴 TCP 或 UDP 進行傳輸，而是<strong>直接封裝在 IP 封包之上</strong>，其專屬的 <strong>IP 協定號碼 (Protocol Number) 為 89</strong>。在 FortiGate 作為防火牆的架構下，如果 Local-In Policy 或是介面的存取控制清單 (ACL) 阻擋了 IP Protocol 89 的流量，OSPF 的所有溝通（包含 Hello, DBD, LSR, LSU 等）都會被丟棄。使用 <code class=\"bg-slate-100 px-1 rounded text-xs\">diagnose sniffer packet</code> 針對 protocol 89 進行抓包，是確認流量是否有被正常收發的標準 Troubleshooting 手法。</p>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A (Check if there is an active static route to the peer)：</strong> 錯誤。OSPF 的設計機制是在直連網段 (Directly connected networks) 上透過群播地址 (Multicast，如 224.0.0.5 / 224.0.0.6) 自動探索並建立鄰居關係。因此，OSPF 不需要（也不應該）依賴靜態路由來找到直連的 Peer。即使是在 NBMA (Non-Broadcast Multi-Access) 網路上需要單播指定鄰居，依賴的也是介面的直連路由，而非額外設定的靜態路由。</li>\n<li><strong>選項 C (Check if TCP port 179 is blocked)：</strong> 錯誤。這是一個非常典型的觀念混淆干擾選項。<strong>TCP Port 179 是 BGP (Border Gateway Protocol)</strong> 建立 Peering 時所使用的傳輸埠。OSPF 根本不使用 TCP Port 179，因此檢查這個 Port 對解決 OSPF 鄰居問題毫無幫助。</li>\n</ul>",
    "images": []
  },
  {
    "id": 2,
    "q_en": "Refer to the exhibit.\nPartial output of the real-time LDAP debug is shown.\n\nWhich two actions can the administrator take to resolve this issue? (Choose two.)",
    "options": [
      "A. Ensure the account is active.",
      "B. Ensure the user is providing the correct user credentials.",
      "C. Ensure the user is a member of at least one AD group to ensure that step 4 of the LDAP authentication process is successful.",
      "D. Ensure the user logs in using 'John Smith' not 'jsmith'."
    ],
    "answer": "A, B",
    "explanation": "<p><strong>Q2 正確答案：A, B</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> Firewall Authentication (LDAP 認證機制與除錯)</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>在 LDAP 的即時除錯日誌 (Real-time debug) 中，我們可以看到系統試圖尋找使用者，過濾條件為 <code class=\"bg-slate-100 px-1 rounded text-xs\">filter: sAMAccountName=jsmith</code>，但隨後出現了關鍵的錯誤訊息 <code class=\"bg-slate-100 px-1 rounded text-xs\">get_all_dn-Found no DN</code> 以及 <code class=\"bg-slate-100 px-1 rounded text-xs\">start next dn bind-No more DN left</code>，最後導致 <code class=\"bg-slate-100 px-1 rounded text-xs\">Auth denied</code>。</p>\n<p>這表示 FortiGate 在指定的 Base DN 目錄下，無法找到對應此帳號的 Distinguished Name (DN)。要解決此問題，應從以下兩個方向著手：</p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A (Ensure the account is active)：</strong> 如果 AD 網域帳號已經被停用 (Disabled) 或是過期，且 FortiGate 設定的 LDAP Filter 中包含了排除停用帳號的條件，系統查詢時就會直接略過該物件，導致搜尋不到該 DN。因此，確認帳號是否處於啟用狀態是標準的排障步驟。</li>\n<li><strong>選項 B (Ensure the user is providing the correct user credentials)：</strong> 使用者可能輸入了錯誤的使用者名稱 (Username)，導致系統拿錯誤的字串去比對 <code class=\"bg-slate-100 px-1 rounded text-xs\">sAMAccountName</code>，自然會回傳 <code class=\"bg-slate-100 px-1 rounded text-xs\">Found no DN</code> 的結果。</li>\n</ul>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 C (Ensure the user is a member of at least one AD group...)：</strong> LDAP 認證流程中，必須先成功找到使用者的 DN 並使用該使用者的憑證完成密碼驗證 (Bind)，接著才會進入群組檢查 (Group Verification) 的階段。目前的錯誤發生在最前面的搜尋階段 (<code class=\"bg-slate-100 px-1 rounded text-xs\">Found no DN</code>)，尚未推進到群組比對步驟，因此這不是當下應採取的排障動作。</li>\n<li><strong>選項 D (Ensure the user logs in using 'John Smith' not 'jsmith')：</strong> 根據除錯日誌中的過濾條件 <code class=\"bg-slate-100 px-1 rounded text-xs\">sAMAccountName=jsmith</code>，系統預期比對的屬性是登入帳號 (<code class=\"bg-slate-100 px-1 rounded text-xs\">sAMAccountName</code>) 而非顯示名稱 (Common Name, CN)。一般 AD 環境中 'jsmith' 才是正確的登入名稱，要求使用者改用 'John Smith' 登入反而會使比對完全失效，這是不正確的作法。</li>\n</ul>",
    "images": [
      "q02a.jpg"
    ]
  },

    "answer": "D",
    "explanation": "<p><strong>Q3 正確答案：D</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> System Resources [Memory Segmentation / Kernel Slabs]</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>在 FortiOS 的記憶體架構中，<strong>Slabs（記憶體板塊）</strong> 是專門保留給 <strong>Kernel（核心空間）</strong> 使用的記憶體區塊，用來存放具備共通目的且大小固定的物件（例如 <code class=\"bg-slate-100 px-1 rounded text-xs\">tcp_session</code>, <code class=\"bg-slate-100 px-1 rounded text-xs\">ip_session</code> 等連線表資訊）。因此，所有關於 Slab 的操作與配置都必然屬於 Kernel，絕對不會是 User Space（使用者空間）。</p>\n<div class=\"h-2\"></div>\n<p>依據官方 Study Guide 的公式，計算特定 Slab 總大小的方式為：</p>\n<p>👉 <code class=\"bg-slate-100 px-1 rounded text-xs\">Total slab size = available objects × object size</code></p>\n<p>（總 Slab 大小 ＝ 可用物件數量 × 每個物件的大小）</p>\n<div class=\"h-2\"></div>\n<p>對照題目提供的 <code class=\"bg-slate-100 px-1 rounded text-xs\">diagnose hardware sysinfo slab</code> 輸出表單：</p>\n<p>對於 <code class=\"bg-slate-100 px-1 rounded text-xs\">tcp_session</code> 這個 Slab：</p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li>Active objects（活躍物件數）：3</li>\n<li><strong>Available objects（可用物件數）：5</strong></li>\n<li><strong>Object size（物件大小）：1500</strong></li>\n</ul>\n<div class=\"h-2\"></div>\n<p>計算其總大小：5 × 1500 = <strong>7500</strong>。且 Slab 是隸屬於 <strong>Kernel</strong> 的記憶體，因此選項 D 完全符合正確的數據與系統架構觀念。</p>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A（ip6_session... 1472 kB and associated with kernel）：</strong> 錯誤。查看表格中 <code class=\"bg-slate-100 px-1 rounded text-xs\">ip6_session</code> 的可用物件數（Available objects）為 0，物件大小為 1472。套用公式計算總大小應為 <code class=\"bg-slate-100 px-1 rounded text-xs\">0 × 1472 = 0</code>，而非 1472。</li>\n<li><strong>選項 B（ip_session... 14080 kB and associated with the user space）：</strong> 錯誤。雖然計算數字 (<code class=\"bg-slate-100 px-1 rounded text-xs\">10 × 1408 = 14080</code>) 正確，但 Slab 是屬於<strong>核心空間 (Kernel)</strong> 的記憶體機制，並不屬於使用者空間 (User Space)。</li>\n<li><strong>選項 C（UDPv6... 14080 kB and associated with the user space）：</strong> 錯誤。如同選項 B，雖然數字 (<code class=\"bg-slate-100 px-1 rounded text-xs\">10 × 1408 = 14080</code>) 無誤，但將 Slab 歸類於使用者空間 (User Space) 是觀念上的根本錯誤。</li>\n</ul>",
    "images": [

    ]

  {
    "id": 4,
    "q_en": "Refer to the exhibit.\nThe partial output of diagnose sys session stat command is shown.\n\nWhich statement about the output shown in the exhibit is correct?",
    "options": [
      "A. 27 sessions have expired but are still in the session table in case any out-of-order packets arrive.",
      "B. 562 TCP sessions have their proto_state set to 01 if there is no inspection.",
      "C. There have been 131072 recorded ephemeral sessions but there are no current ones.",
      "D. 113 sessions have been dropped because of memory page exhaustion."
    ],
    "answer": "B",
    "explanation": "<p><strong>Q4 正確答案：B</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> Sessions, Traffic Flow, and Networking [Session Table &amp; TCP States]</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>在 FortiGate 的會話表（Session Table）管理機制中，每一條 TCP 會話都會記錄其通訊協定狀態（<code class=\"bg-slate-100 px-1 rounded text-xs\">proto_state</code>）。當 TCP 三向交握（Three-way Handshake）完成，連線進入 <code class=\"bg-slate-100 px-1 rounded text-xs\">ESTABLISHED</code> 狀態時，在未啟用代理檢測（Proxy-based inspection）的純路由或 Flow-based 模式下，FortiGate 內部會將該 TCP 會話的協定狀態標記為 <strong><code class=\"bg-slate-100 px-1 rounded text-xs\">proto_state=01</code></strong>。</p>\n<p>根據 <code class=\"bg-slate-100 px-1 rounded text-xs\">diagnose sys session stat</code> 的輸出，系統目前有 562 個 TCP sessions 處於 <code class=\"bg-slate-100 px-1 rounded text-xs\">ESTABLISHED</code> 狀態，因此若這些連線沒有經過 Proxy 攔截檢查，它們在會話表中的 <code class=\"bg-slate-100 px-1 rounded text-xs\">proto_state</code> 都會顯示為 <code class=\"bg-slate-100 px-1 rounded text-xs\">01</code>。</p>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A（27 sessions have expired but are still in the session table...）：</strong> 錯誤。輸出中顯示「27 in CLOSE state」，這表示有 27 個連線已經收到了 FIN 或 RST 封包，正在進行 TCP 連線的關閉流程（例如進入 TIME_WAIT 等狀態來等待可能遲到的亂序封包）。這些會話<strong>尚未過期 (expired)</strong>，一旦真正到達逾時限制 (Timeout)，它們就會被從 Session Table 中完全移除，並記錄到 <code class=\"bg-slate-100 px-1 rounded text-xs\">exp_count</code> 裡。</li>\n<li><strong>選項 C（There have been 131072 recorded ephemeral sessions...）：</strong> 錯誤。輸出中的 <code class=\"bg-slate-100 px-1 rounded text-xs\">ephemeral=0/131072</code>，其格式為 <code class=\"bg-slate-100 px-1 rounded text-xs\">目前數量 / 系統最大限制容量 (Current/Max)</code>。這代表系統「目前有 0 個」臨時會話（通常是未完成交握或 UDP 狀態），且系統為此分配的「最大容量為 131072 個」，<strong>而不是</strong>歷史上總共記錄了 131072 個。</li>\n<li><strong>選項 D（113 sessions have been dropped because of memory page exhaustion）：</strong> 錯誤。輸出中的 <code class=\"bg-slate-100 px-1 rounded text-xs\">clash=113</code> 指的是 <strong>Session Clash（會話衝突）</strong>。這通常發生在系統試圖建立新的 Session，但其五元組（Source IP, Source Port, Destination IP, Destination Port, Protocol）與現有會話表中的項目發生重疊衝突（最常見於 SNAT Source Port 耗盡時）。如果連線是因為記憶體枯竭（Memory Exhaustion）而遭到丟棄，對應的數據會顯示在 <code class=\"bg-slate-100 px-1 rounded text-xs\">memory_tension_drop</code>（目前輸出顯示為 0）或 <code class=\"bg-slate-100 px-1 rounded text-xs\">extreme_low_mem</code> 欄位中。</li>\n</ul>",
    "images": [
      "q04a.jpg"
    ]
  },

    "id": 5,
    "q_en": "A VPN tunnel is up. To monitor traffic flow, the administrator enters the following CLI commands on an SSH session on FortiGate:\n# diagnose debug enable\n# diagnose sniffer packet any 'udp and port 500' 4\nHowever, the sniffer does not show any output.\nAssuming default configuration values, what are two possible reasons there is no output? (Choose two.)",
    "options": [
      "A. The sniffer output will be ignored because running diagnose debug enable shows only application real-time debugs.",
      "B. NAT Traversal is enabled.",
      "C. The sniffer must be restricted to the remote peer IP address.",
      "D. The filter should be modified to also capture packets for TCP port 443 or TCP port 4500."
    ],
    "answer": "B, D",
    "explanation": "<p><strong>Q5 正確答案：B, D</strong> <em>(💡 講師小提醒：選項 D 在某些流傳的題庫中存在文字誤植，請詳見下方解析)</em></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> Troubleshooting Concepts &amp; IPsec VPN</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>本題的情境是「VPN 隧道已經建立 (up)」，而網管人員想要「監控資料流量 (monitor traffic flow)」，但嗅探器 (sniffer) 卻只設定過濾 <code class=\"bg-slate-100 px-1 rounded text-xs\">udp and port 500</code>。畫面上沒有看到任何輸出的原因如下：</p>\n<div class=\"h-2\"></div>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 B (NAT Traversal is enabled)：</strong> 在 FortiOS 的預設設定中，NAT-T (NAT Traversal) 是啟用的。當 VPN 隧道建立並在路徑上偵測到 NAT 設備時，為了讓 IPsec 封包能順利穿越防火牆與 NAT，後續的 IKE 溝通與封裝了實際資料的 ESP 流量，都會被<strong>轉換到 UDP Port 4500</strong> 進行傳輸。</li>\n</ul>\n<p>    此外，即使環境中沒有 NAT，一旦 VPN 建立完成，使用者真正在傳遞的資料流量 (Traffic flow) 也會是純 <strong>ESP (IP Protocol 50)</strong> 封包。UDP 500 僅用於初始的 IKE 交握 (Phase 1 &amp; 2) 以及偶爾的 DPD/Rekey。因此，只抓 UDP 500 是看不到正常資料流的。</p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 D (The filter should be modified to also capture packets for TCP port 443 or TCP port 4500)：</strong></li>\n<li><strong>【考題除錯與原理解析】</strong> 根據正規的 Fortinet NSE 7 教材，這個選項正確的敘述原型應該是：「The filter should be modified to also capture packets for <strong>ESP or UDP port 4500</strong>」（過濾器應修改為抓取 ESP 協定或 UDP 4500）。</li>\n<li>然而，您提供的選項內容變成了 <code class=\"bg-slate-100 px-1 rounded text-xs\">TCP port 443 or TCP port 4500</code>，這實際上是指 Fortinet 的 <strong>IPsec over TCP</strong> 功能（當標準 UDP 被 ISP 阻擋時使用的備援機制）。雖然題目有前提「Assuming default configuration values（預設未開啟 IPsec over TCP）」，這使得目前的 D 選項在邏輯上有些矛盾。但在實際認證考試與題庫中，這屬於極常見的<strong>文字轉錄錯誤 (Typo)</strong>。基於刪去法（A、C 絕對錯誤），您在模擬器或實戰中仍必須選擇 B 與 D，其背後的真正核心觀念是：「必須修改 filter 去涵蓋真正承載資料的協定與 Port」。</li>\n</ul>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A (The sniffer output will be ignored because running diagnose debug enable...)：</strong> 錯誤觀念。<code class=\"bg-slate-100 px-1 rounded text-xs\">diagnose sniffer packet</code> 是一個完全獨立運作的封包擷取工具（基於 tcpdump），它<strong>不需要</strong>搭配 <code class=\"bg-slate-100 px-1 rounded text-xs\">diagnose debug enable</code> 就能直接在畫面上印出抓包結果。<code class=\"bg-slate-100 px-1 rounded text-xs\">diagnose debug enable</code> 主要是用來啟動應用層 (Application Daemon，如 IKE, routing) 的即時除錯訊息，兩者互不干擾，絕不會因為開啟 debug 就導致 sniffer 輸出被忽略。</li>\n<li><strong>選項 C (The sniffer must be restricted to the remote peer IP address)：</strong> 錯誤。Sniffer 指令中指定的介面是 <code class=\"bg-slate-100 px-1 rounded text-xs\">any</code>，代表它會在所有介面上進行全域監聽。過濾條件 <code class=\"bg-slate-100 px-1 rounded text-xs\">'udp and port 500'</code> 在語法上完全合法且完整，只要有符合該條件的封包經過，就一定會顯示，並非「強制必須」限制遠端 Peer IP 才能印出結果。</li>\n</ul>",
    "images": []
  },

    "q_en": "Refer to the exhibit.\nThe output from using the command diagnose debug application samld -1 to diagnose a SAML connection is shown.\n\nDiagnose output -\n\nBased on this output, which two conclusions can you draw? (Choose two.)",
    "options": [
      "A. The SP IP address is 10.1.10.2.",
      "B. The IdP IP address is 10.1.10.2.",
      "C. The IdP IP address is 10.1.10.254.",

    ],
    "answer": "B, D",
    "explanation": "<p><strong>Q6 正確答案：B, D</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> Firewall Authentication [SAML Authentication Process]</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>要解讀這段 <code class=\"bg-slate-100 px-1 rounded text-xs\">diagnose debug application samld -1</code> 的除錯日誌，我們必須了解 SAML (Security Assertion Markup Language) 認證請求 (<code class=\"bg-slate-100 px-1 rounded text-xs\">AuthnRequest</code>) 的標準 XML 屬性定義。這段封包是由 Service Provider (SP，也就是這台 FortiGate) 生成並發送給 Identity Provider (IdP) 的：</p>\n<div class=\"h-2\"></div>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 B (The IdP IP address is 10.1.10.2)：</strong> 正確。在除錯日誌中可以看到 <code class=\"bg-slate-100 px-1 rounded text-xs\">Destination=\"https://10.1.10.2/saml-idp/nst/login/\"</code>。<code class=\"bg-slate-100 px-1 rounded text-xs\">Destination</code> 屬性代表這個認證請求的目的地，也就是負責驗證身分的 <strong>IdP (身分提供者)</strong> 的登入 URL。此外，下方的 <code class=\"bg-slate-100 px-1 rounded text-xs\">&lt;lasso:RemoteProviderID&gt;</code> 也指向了 10.1.10.2，證明遠端提供者為 IdP。</li>\n<li><strong>選項 D (The SP IP address is 10.1.10.254)：</strong> 正確。日誌中標示了 <code class=\"bg-slate-100 px-1 rounded text-xs\">AssertionConsumerServiceURL=\"https://10.1.10.254:1003/remote/saml/login/\"</code>。這是 SP 告訴 IdP：「當你完成使用者認證後，請將 SAML 回應 (Assertion) 送回這個網址給我」。同時，<code class=\"bg-slate-100 px-1 rounded text-xs\">&lt;saml:Issuer&gt;</code> (發行者) 也是 10.1.10.254。這兩項屬性都明確證明了 <strong>SP (服務提供者)</strong> 的 IP 位址是 10.1.10.254。</li>\n</ul>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A (The SP IP address is 10.1.10.2)：</strong> 錯誤。如前所述，10.1.10.2 在封包中是作為 <code class=\"bg-slate-100 px-1 rounded text-xs\">Destination</code> (請求接收方) 與 <code class=\"bg-slate-100 px-1 rounded text-xs\">RemoteProviderID</code>，這在 SAML SP-initiated 的登入流程中代表的是 IdP 的角色，而非 SP。</li>\n<li><strong>選項 C (The IdP IP address is 10.1.10.254)：</strong> 錯誤。10.1.10.254 在封包中扮演 <code class=\"bg-slate-100 px-1 rounded text-xs\">Issuer</code> (請求發起方) 與提供 ACS URL (接收斷言的端點) 的角色，這是標準的 SP 屬性，絕非 IdP。將兩者 IP 角色反轉是觀念上的混淆。</li>\n</ul>",
    "images": [
      "q06a.jpg"
    ]
  },

    "id": 7,
    "q_en": "Refer to the exhibit.\n\nRouting table -\n\nThe routing table information is shown.\nAssuming a default configuration, which three statements about the RPF check on FortiGate are correct? (Choose three.)",
    "options": [
      "A. User B: Fail. There is no route to 95.56.234.24 using wan2 in the routing table.",
      "B. User A: Pass. The default static route through wan1 passes the RPF check regardless of the source IP address.",
      "C. User C: Pass. FortiGate will forward all incoming packets from User C using the default static route.",
      "D. User C: Fail. There is no route to 10.0.4.63 using port1 in the routing table.",
      "E. User B: Pass. FortiGate will use asymmetric routing using wan1 to reply to traffic for 95.56.234.24."
    ],
    "answer": "A, B, D",
    "explanation": "<p><strong>Q7 正確答案：A, B, D</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> Routing &amp; Architecture [RPF (Reverse Path Forwarding) Check]</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>在 FortiOS 的預設設定下，系統會對所有進入的封包執行 <strong>Strict RPF (嚴格反向路徑轉發)</strong> 檢查，以防範 IP 欺騙 (IP Spoofing) 攻擊。Strict RPF 的運作邏輯為：<strong>「當防火牆收到一個封包時，會去查詢路由表，確認前往該封包 Source IP 的最佳路由（回程路由）出站介面，是否與該封包進入防火牆的介面一致。」</strong>若不一致，FortiGate 就會將封包丟棄。</p>\n<div class=\"h-2\"></div>\n<p>根據題目附圖中的路由表：</p>\n<p>- 預設路由 (Default Route, <code class=\"bg-slate-100 px-1 rounded text-xs\">0.0.0.0/0</code>) 指向 <code class=\"bg-slate-100 px-1 rounded text-xs\">wan1</code>。</p>\n<p>- <code class=\"bg-slate-100 px-1 rounded text-xs\">wan1</code> 直連 <code class=\"bg-slate-100 px-1 rounded text-xs\">10.0.1.0/24</code>。</p>\n<p>- <code class=\"bg-slate-100 px-1 rounded text-xs\">wan2</code> 直連 <code class=\"bg-slate-100 px-1 rounded text-xs\">10.0.2.0/24</code>。</p>\n<p>- <code class=\"bg-slate-100 px-1 rounded text-xs\">port1</code> 直連 <code class=\"bg-slate-100 px-1 rounded text-xs\">10.0.3.0/24</code>。</p>\n<div class=\"h-2\"></div>\n<p>依據上述規則分析選項：</p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A (User B: Fail...)：</strong> 正確。User B 的來源 IP 是 <code class=\"bg-slate-100 px-1 rounded text-xs\">95.56.234.24</code>，封包從 <code class=\"bg-slate-100 px-1 rounded text-xs\">wan2</code> 介面進入。然而，查閱路由表，並沒有往 <code class=\"bg-slate-100 px-1 rounded text-xs\">95.56.234.24</code> 的明確路由，因此會落入預設路由 <code class=\"bg-slate-100 px-1 rounded text-xs\">0.0.0.0/0</code>，其指向的回程出站介面為 <code class=\"bg-slate-100 px-1 rounded text-xs\">wan1</code>。進入介面 (<code class=\"bg-slate-100 px-1 rounded text-xs\">wan2</code>) 與回程介面 (<code class=\"bg-slate-100 px-1 rounded text-xs\">wan1</code>) 不符，RPF 檢查失敗，封包被丟棄。</li>\n<li><strong>選項 B (User A: Pass...)：</strong> 正確。User A 封包從 <code class=\"bg-slate-100 px-1 rounded text-xs\">wan1</code> 進入。在沒有更精確路由的情況下，任何網際網路的 Source IP（包含 User A 的 <code class=\"bg-slate-100 px-1 rounded text-xs\">71.234.149.16</code>）都會比對到預設路由 <code class=\"bg-slate-100 px-1 rounded text-xs\">0.0.0.0/0</code>，而該路由正好也是指向 <code class=\"bg-slate-100 px-1 rounded text-xs\">wan1</code>。進入介面與回程介面完全吻合，因此通過 RPF 檢查。</li>\n<li><strong>選項 D (User C: Fail...)：</strong> 正確。User C 的來源 IP 為 <code class=\"bg-slate-100 px-1 rounded text-xs\">10.0.4.63</code>，從 <code class=\"bg-slate-100 px-1 rounded text-xs\">port1</code> 介面進入。但在路由表中，只有 <code class=\"bg-slate-100 px-1 rounded text-xs\">port1</code> 上的直連網段 <code class=\"bg-slate-100 px-1 rounded text-xs\">10.0.3.0/24</code>，並<strong>沒有</strong>設定前往 <code class=\"bg-slate-100 px-1 rounded text-xs\">10.0.4.0/24</code> 的靜態或動態路由。因此，要回覆給 User C 的路由判斷會落入預設路由，指向 <code class=\"bg-slate-100 px-1 rounded text-xs\">wan1</code>。進入介面 (<code class=\"bg-slate-100 px-1 rounded text-xs\">port1</code>) 與回程出站介面 (<code class=\"bg-slate-100 px-1 rounded text-xs\">wan1</code>) 不一致，RPF 檢查失敗。</li>\n</ul>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 C (User C: Pass. FortiGate will forward all incoming packets...)：</strong> 錯誤。由於路由表缺失前往 <code class=\"bg-slate-100 px-1 rounded text-xs\">10.0.4.0/24</code> 的精確路由，預設路由將回程流量導向 <code class=\"bg-slate-100 px-1 rounded text-xs\">wan1</code>，這導致了 RPF 檢查失敗，封包會直接在 <code class=\"bg-slate-100 px-1 rounded text-xs\">port1</code> 被丟棄，FortiGate 不會轉發這些封包。</li>\n<li><strong>選項 E (User B: Pass. FortiGate will use asymmetric routing...)：</strong> 錯誤。這違背了題目的前提「Assuming a default configuration（假設為預設設定）」。在預設的 Strict RPF 模式下，非對稱路由 (Asymmetric Routing) 的流量會直接判定為非法並被阻擋。如果工程師真的要允許這種非對稱流量，必須進入 CLI 全域設定將非對稱路由開啟（<code class=\"bg-slate-100 px-1 rounded text-xs\">set asymmetric-routing enable</code>）或將 RPF 檢查模式降級為 Feasible（<code class=\"bg-slate-100 px-1 rounded text-xs\">set strict-src-check disable</code>），這已不屬於預設狀態。</li>\n</ul>",

    ]

    "id": 8,
    "q_en": "Refer to the exhibit.\nThe sniffer log on two FortiGate devices are shown.\n\nBased on the information in the log, which two factors explain the output on FortiGate FGT-02?",
    "options": [
      "A. The administrator configured the wrong remote peer IP address on FGT-01.",
      "B. The administrator set the wrong sniffer filter on FGT-02.",
      "C. The administrator has not yet configured the VPN tunnel on FGT-02.",
      "D. A third-party device is blocking protocol 50."
    ],
    "answer": "A, D",
    "explanation": "<p><strong>Q8 正確答案：A, D</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> Troubleshooting Concepts &amp; IPsec VPN [Packet Sniffing &amp; ESP Traffic]</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>這是一題非常經典的 VPN 封包層級排障題。我們先解讀兩台設備的除錯日誌（Sniffer Log）：</p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>FGT-01：</strong> 成功抓到向外發送 (<code class=\"bg-slate-100 px-1 rounded text-xs\">out</code>) 的 ESP 封包（IP 協定號碼 50），目的地 IP 為 <code class=\"bg-slate-100 px-1 rounded text-xs\">97.86.16.52</code>。</li>\n<li><strong>FGT-02：</strong> 使用相同的過濾條件 <code class=\"bg-slate-100 px-1 rounded text-xs\">any 'esp'</code>，卻<strong>完全沒有</strong>抓到任何封包（包含進站封包）。</li>\n</ul>\n<div class=\"h-2\"></div>\n<p>這代表 FGT-01 確實把 ESP 封包送出去了，但是這些封包<strong>「根本沒有抵達」</strong> FGT-02 的網路介面。會造成這個現象的合理原因有兩個：</p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A (The administrator configured the wrong remote peer IP address on FGT-01)：</strong> 如果網管人員在 FGT-01 設定了錯誤的遠端閘道器 IP（例如 <code class=\"bg-slate-100 px-1 rounded text-xs\">97.86.16.52</code> 根本不是 FGT-02 的外網 IP），封包就會被送到網際網路上的其他地方，FGT-02 自然連一根毛都抓不到。</li>\n<li><strong>選項 D (A third-party device is blocking protocol 50)：</strong> 如果 FGT-01 設定的 IP 是正確的，但中間的傳輸節點（例如 ISP 業者、第三方防火牆或路由器）阻擋了 <strong>IP Protocol 50 (ESP)</strong>，封包會在半路被丟棄（Dropped in transit），導致 FGT-02 的實體介面永遠收不到這些封包。</li>\n</ul>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 B (The administrator set the wrong sniffer filter on FGT-02)：</strong> 錯誤。FGT-02 使用的過濾器是 <code class=\"bg-slate-100 px-1 rounded text-xs\">'esp'</code>，這個語法完全正確且合法，專門用來過濾 IP 協定 50 的流量。既然 FGT-01 能用同一個指令抓到封包，代表指令語法本身沒有問題。</li>\n<li><strong>選項 C (The administrator has not yet configured the VPN tunnel on FGT-02)：</strong> 這是很多新手會掉入的陷阱。<code class=\"bg-slate-100 px-1 rounded text-xs\">diagnose sniffer packet</code> 這個抓包指令是運作在 <strong>網卡介面的混雜模式 (Promiscuous mode) / 底層驅動階段</strong>。這意味著即使 FGT-02 <strong>完全沒有設定 VPN</strong>，只要有 ESP 封包實實在在地打在它的外部網卡上，Sniffer 就一定會印出 <code class=\"bg-slate-100 px-1 rounded text-xs\">in</code>（進站）的紀錄（隨後封包才會因為找不到對應的 IPsec SA 而被丟棄）。如今 Sniffer 顯示 <code class=\"bg-slate-100 px-1 rounded text-xs\">no packets captured</code>，證明問題發生在封包「抵達 FGT-02 之前」，而不是因為 FGT-02 內部沒設定 VPN。</li>\n</ul>",
    "images": [
      "q08a.jpg"
    ]
  },
  {
    "id": 9,
    "q_en": "Refer to the exhibit.\nHigh Availability configuration status\n\nWhich two statements about the output are true considering NGFW-1 and NGFW-2 have been up for a week? (Choose two.)",
    "options": [
      "A. If a configuration change is made to the secondary FortiGate, the Configuration Status will not change.",
      "B. If a configuration change is made to the primary FortiGate at this time, the secondary will initiate a synchronization reset.",
      "C. If FGVM...649 is rebooted, FGVM...650 will become the primary FortiGate and retain that role, even after FGVM...649 rejoins the cluster.",
      "D. If port7 becomes disconnected on the secondary FortiGate, both FortiGate devices will elect themselves as primary."
    ],
    "answer": "C, D",
    "explanation": "<p><strong>Q9 正確答案：C, D</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> Infrastructure &amp; High Availability (HA) [HA Election Process &amp; Split-Brain]</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>這題考驗的是對於 FortiGate HA (High Availability) 選舉機制與心跳線 (Heartbeat) 運作狀態的理解：</p>\n<div class=\"h-2\"></div>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 C (If FGVM...649 is rebooted, FGVM...650 will become the primary...)：</strong> 正確。在 FortiGate HA 的預設選舉規則中，當 <strong><code class=\"bg-slate-100 px-1 rounded text-xs\">override: disable</code></strong>（搶佔模式關閉）時，系統會優先比較兩台設備的 <strong>Uptime（開機運行時間）</strong>，且只要差距超過 300 秒（5 分鐘），Uptime 長的設備就會直接當選為 Primary。</li>\n</ul>\n<p>    根據題目情境，兩台設備已經穩定運作了一週。如果 Primary (<code class=\"bg-slate-100 px-1 rounded text-xs\">FGVM...649</code>) 被重開機，它的 Uptime 將會歸零，而 Secondary (<code class=\"bg-slate-100 px-1 rounded text-xs\">FGVM...650</code>) 的 Uptime 是一週。因此，<code class=\"bg-slate-100 px-1 rounded text-xs\">650</code> 會立刻接管成為 Primary。當 <code class=\"bg-slate-100 px-1 rounded text-xs\">649</code> 重新加回叢集時，因為它的 Uptime 遠低於 <code class=\"bg-slate-100 px-1 rounded text-xs\">650</code>，且 <code class=\"bg-slate-100 px-1 rounded text-xs\">override</code> 為 disable，<code class=\"bg-slate-100 px-1 rounded text-xs\">649</code> 不會因為自己的 Priority 較高就搶回主控權，<code class=\"bg-slate-100 px-1 rounded text-xs\">650</code> 會繼續維持 Primary 角色。</p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 D (If port7 becomes disconnected on the secondary FortiGate, both FortiGate devices will elect themselves as primary.)：</strong> 正確。從指令輸出的 <code class=\"bg-slate-100 px-1 rounded text-xs\">HBDEV stats:</code> 區塊可以觀察到，這個 HA 叢集<strong>只有配置 <code class=\"bg-slate-100 px-1 rounded text-xs\">port7</code> 一個介面作為心跳線</strong>。如果 <code class=\"bg-slate-100 px-1 rounded text-xs\">port7</code> 斷線，Primary 和 Secondary 之間將完全失去通訊。在無法收到對方 Heartbeat 封包的情況下，Secondary 會以為 Primary 已經死機而將自己升級為 Primary；同時間，原本的 Primary 也會因為收不到 Secondary 的回應而繼續保持 Primary。這就是典型的 <strong>Split-Brain（腦裂）</strong> 現象。</li>\n</ul>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A (If a configuration change is made to the secondary FortiGate, the Configuration Status will not change.)：</strong> 錯誤。雖然在正常的 HA 架構下，管理員無法直接登入 Secondary 修改一般設定，但若透過特定除錯指令或在斷線狀態下進行了修改，導致兩台設備設定檔的 Checksum（校驗碼）不一致，輸出中的 <code class=\"bg-slate-100 px-1 rounded text-xs\">Configuration Status</code> 會立刻從 <code class=\"bg-slate-100 px-1 rounded text-xs\">in-sync</code> 變成 <code class=\"bg-slate-100 px-1 rounded text-xs\">out-of-sync</code>，狀態一定會改變。</li>\n<li><strong>選項 B (If a configuration change is made to the primary FortiGate at this time, the secondary will initiate a synchronization reset.)：</strong> 錯誤。在 FortiGate HA 的設定同步機制中，是由 <strong>Primary (Active 設備)</strong> 負責將設定檔的變更（Delta）或完整配置推播 (Push) 給 Secondary。Secondary 扮演的是被動接收與套用的角色，它不會主動發起「synchronization reset（同步重置）」。</li>\n</ul>",
    "images": [
      "q09a.jpg"
    ]
  },

    "id": 10,
    "q_en": "In a Security Fabric environment, which three actions must you take to ensure successful communication among the nodes? (Choose three.)",
    "options": [
      "A. You must authorize the downstream FortiGate on the root FortiGate.",
      "B. You must configure FortiGate in transparent mode.",
      "C. You must enable FortiTelemetry on the receiving interface of the upstream FortiGate.",
      "D. You must ensure that the port for Neighbor Discovery has been changed.",
      "E. You must ensure that TCP port 8013 is not blocked along the way."
    ],
    "answer": "A, C, E",
    "explanation": "<p><strong>Q10 正確答案：A, C, E</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> Security Fabric [Fabric Communication &amp; Topologies]</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>要成功建立 Fortinet Security Fabric（安全織網），確保各節點（Nodes）之間能夠互相發現、同步物件並傳遞遙測資料，網管工程師必須滿足以下三個關鍵條件：</p>\n<div class=\"h-2\"></div>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A (You must authorize the downstream FortiGate on the root FortiGate)：</strong> 基於安全性考量，防止未知的未授權設備隨意接入內部 Fabric 拓樸，當下游 (Downstream) 的 FortiGate 配置好指向上游的設定後，上游的根節點 (Root FortiGate) 管理者必須在畫面上（或透過 CLI）手動點擊「授權 (Authorize)」。雙方完成憑證與信任關係的交換後，Fabric 才能正式連線。</li>\n<li><strong>選項 C (You must enable FortiTelemetry on the receiving interface of the upstream FortiGate)：</strong> Fabric 設備間的專屬溝通語言是 <strong>FortiTelemetry</strong>。因此，上游 (Upstream) 設備用來「接收」下游設備連線的那個實體或邏輯介面 (Interface)，在其 <code class=\"bg-slate-100 px-1 rounded text-xs\">Administrative Access</code> 設定中，必須明確勾選開啟 <code class=\"bg-slate-100 px-1 rounded text-xs\">FortiTelemetry</code> 功能，否則底層會直接拒絕連線請求。</li>\n<li><strong>選項 E (You must ensure that TCP port 8013 is not blocked along the way)：</strong> Security Fabric 節點之間（即 FortiTelemetry）預設的底層通訊埠為 <strong>TCP Port 8013</strong>。在跨網段或跨設備連線時，必須確保沿途的路由器 ACL、中介防火牆的 Policy，甚至是 FortiGate 自身的 Local-In Policy 都沒有阻擋 TCP 8013，連線才能順利建立。</li>\n</ul>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 B (You must configure FortiGate in transparent mode)：</strong> 錯誤觀念。Security Fabric 完美支援 NAT/Route 模式，這也是絕大多數企業最標準的部署架構。雖然 Fabric 也支援 Transparent mode 的設備加入，但這絕對不是「必須 (must)」的條件。</li>\n<li><strong>選項 D (You must ensure that the port for Neighbor Discovery has been changed)：</strong> 錯誤。FortiGate 之間的設備探索通常依賴預設的通訊協定與 Port 號。在沒有特殊衝突的環境下，我們不需要（也不建議）去修改預設的 Neighbor Discovery 通訊埠。維持預設設定就能確保 Fabric 正常運作，修改 Port 反而會增加維運複雜度，這並非必要條件。</li>\n</ul>",
    "images": []
  },

    ],
    "answer": "A, D",
    "explanation": "<p><strong>Q11 正確答案：A, D</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> Security Fabric [Automation Stitches]</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>在 FortiOS 中，Automation Stitches（自動化腳本）是 Security Fabric 裡非常強大的維運工具，它透過「觸發器 (Triggers)」與「動作 (Actions)」的組合來實現系統自動化管理。</p>\n<div class=\"h-2\"></div>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A (You can configure automation stitches to run diagnostic commands...)：</strong> 正確。這是非常典型的 Troubleshooting 自動化應用場景。網管工程師可以設定一個 Trigger 監控「CPU 或記憶體使用率過高（Conserve Mode）」，當事件發生時，觸發一系列 Actions：第一步自動執行 CLI 診斷指令（例如 <code class=\"bg-slate-100 px-1 rounded text-xs\">diagnose sys top</code> 抓取當下高耗能的 Process），第二步將該指令的輸出結果作為附件，透過 Email 動作即時發送給管理員。</li>\n<li><strong>選項 D (You can configure automation stitches to take parameters from previous actions...)：</strong> 正確。當你的自動化動作設定為 <strong>「循序執行 (Sequential)」</strong> 時，FortiGate 允許將前一個動作所產生的變數、結果或參數（Parameters/Outputs），直接傳遞給下一個動作當作輸入值（Input）。這使得自動化流程可以具備上下文關聯性，例如：先擷取某個被封鎖的 IP，再將該 IP 傳遞給下一個 Webhook 動作去通知外部的 SOC 系統。</li>\n</ul>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 B (You can configure automation stitches to insert a delay... in parallel)：</strong> 錯誤。雖然 Automation Stitches 確實提供「插入延遲 (Delay)」的 Action，但這個延遲機制<strong>僅能應用於「循序執行 (Sequential)」</strong> 的工作流程中，用來讓系統等待一段時間後再執行下一步。如果你將執行模式設定為「平行 (Parallel)」，所有的動作會同時被觸發，在邏輯上無法於平行動作之間插入相對的延遲。</li>\n<li><strong>選項 C (You can configure automation stitches to modify packet headers and payloads...)：</strong> 錯誤。Automation Stitches 運作於<strong>管理層 / 控制層 (Management/Control Plane)</strong>，專門用來處理系統日誌、告警、設定變更與 API 呼叫。它<strong>絕對無法</strong>在資料層 (Data Plane) 即時去「修改網路封包的標頭 (Headers) 或負載 (Payloads)」。修改封包特徵是防火牆策略（NAT, IPsec, Proxy 等）以及硬體加速晶片 (NP) 的職責，絕非自動化腳本的功能。</li>\n</ul>",
    "images": []
  },
  {
    "id": 12,
    "q_en": "During the SAML negotiation process, in which section does the identity Provider (IdP) provide the SAML attributes utilized in the authentication process to the service provider (SP)?",
    "options": [
      "A. Assertion dump",
      "B. Bindings HTTP post",
      "C. Authentication request",
      "D. Authentication response"
    ],
    "answer": "A",
    "explanation": "<p><strong>Q12 正確答案：A</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> Firewall Authentication [SAML]</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>在 SAML (Security Assertion Markup Language) 認證協商的運作機制中，當使用者成功向身分提供者 (IdP) 驗證身分後，IdP 會向服務提供者 (SP，例如 FortiGate) 發送包含使用者資訊的聲明 (Assertion)。</p>\n<div class=\"h-2\"></div>\n<p>使用者在認證與授權過程中所需要的 SAML 屬性（SAML Attributes，例如：使用者名稱 Username、群組身分 Group Membership、電子郵件等），皆精確地封裝在 <strong>Assertion</strong> 區塊之中。在實務的除錯作業（例如執行 <code class=\"bg-slate-100 px-1 rounded text-xs\">diagnose debug application samld -1</code>）時，網管工程師必須透過檢視 <strong>Assertion dump</strong> 區段，才能確認 IdP 實際拋轉了哪些屬性給 SP。</p>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 B（Bindings HTTP post）：</strong> 這指的是 SAML 訊息在網路層的「傳輸綁定方式（Transport Mechanism）」，代表該訊息是透過瀏覽器的 HTTP POST 方法來進行轉送。它描述的是傳輸手段，而非承載屬性資料的區塊。</li>\n<li><strong>選項 C（Authentication request）：</strong> 這是由 SP（FortiGate）發送給 IdP 以「發起」認證流程的初始請求（AuthnRequest）。因為在此階段使用者尚未在 IdP 完成認證，該請求封包內不可能包含使用者的 SAML 屬性。</li>\n<li><strong>選項 D（Authentication response）：</strong> 這是一個具有高度干擾性的選項。雖然整個 SAML Response 封包確實包含了 Assertion，但在嚴格的 SAML 結構與系統除錯日誌（Debug Log）中，真正記載使用者屬性細節的精確區塊是內嵌於 Response 中的「Assertion」。因此，若要指定查看屬性的特定區段，正確解答應指名為 Assertion dump。</li>\n</ul>",
    "images": []
  },
  {
    "id": 13,
    "q_en": "Refer to the exhibit.\nTwo entries that were generated in the FSSO collector agent log is shown.\n\nWhich three conclusions can you draw from these log entries? (Choose three.)",
    "options": [
      "A. Remote registry is not running on the workstation.",
      "B. The user's status shows as \"not verified\" in the collector agent.",
      "C. DNS resolution is unable to resolve the workstation name.",
      "D. A firewall is blocking traffic to port 139 and 445.",
      "E. The logged on user is part of a group that is not configured in the group filter."
    ],
    "answer": "A, B, D",
    "explanation": "<p><strong>Q13 正確答案：A, B, D</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> FSSO (Fortinet Single Sign-On) [Workstation Check / Troubleshooting]</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>在 FSSO 架構中，Collector Agent 為了確保防火牆上身分驗證表的準確性，預設會定期對使用者的工作站進行輪詢（此機制稱為 Workstation Check），以確認該使用者是否仍在登入狀態。這個遠端檢查機制主要依賴 Windows 的 <strong>Remote Registry (遠端登錄服務)</strong> 或是 <strong>WMI (Windows Management Instrumentation)</strong>，使用的通訊埠通常為 TCP Port 139 與 445。</p>\n<div class=\"h-2\"></div>\n<p>從題目提供的日誌 <code class=\"bg-slate-100 px-1 rounded text-xs\">wksta check: failed to connect to workstation:10.0.155.23</code> 以及 <code class=\"bg-slate-100 px-1 rounded text-xs\">wksta_check_wmi: cannot get UserName</code> 可以明顯看出，Collector Agent 嘗試去探測工作站 10.0.155.23，但被拒絕或無法建立連線。由此可得出以下三個結論：</p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A (Remote registry is not running on the workstation)：</strong> 這是最常見的原因之一。如果 Windows 端點的「Remote Registry」服務被停用或未啟動，Collector Agent 就無法跨網讀取登錄檔來驗證登入帳號，從而產生連線失敗的錯誤。</li>\n<li><strong>選項 B (The user's status shows as \"not verified\" in the collector agent)：</strong> 在 FSSO 的運作邏輯中，當 Collector Agent 連續無法透過 Workstation Check 聯繫上該端點時，它不會立刻將使用者踢除，而是會先將該使用者的狀態標記為「未驗證 (Not Verified)」。</li>\n<li><strong>選項 D (A firewall is blocking traffic to port 139 and 445)：</strong> 如果端點本機啟用了 Windows Defender 防火牆，或者網路中間有其他防火牆阻擋了 NetBIOS (TCP 139) 或 SMB (TCP 445) 協定，Collector Agent 的探測封包就會無法抵達工作站，造成同樣的錯誤日誌。</li>\n</ul>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 C (DNS resolution is unable to resolve the workstation name)：</strong> 錯誤。觀察日誌內容 <code class=\"bg-slate-100 px-1 rounded text-xs\">failed to connect to workstation:10.0.155.23 (10.0.155.23)</code>，系統是直接帶入 IP 位址去進行連線探測的，這代表解析過程沒有問題（或直接使用 IP），此錯誤純粹是連線層或服務層的阻礙，與 DNS 解析失敗無關。</li>\n<li><strong>選項 E (The logged on user is part of a group that is not configured in the group filter)：</strong> 錯誤。如果該使用者隸屬於未受監控的群組（不在 Group Filter 的白名單內），Collector Agent 在第一時間從 DC (Domain Controller) 收到 Logon Event 時就會直接將其「忽略 (Ignore)」。既然已經忽略，系統就根本不會把這台電腦加進監控清單，更不可能對它發起後續的 Workstation Check。</li>\n</ul>",
    "images": [
      "q13a.jpg"
    ]
  },
  {
    "id": 14,
    "q_en": "Refer to the exhibit.\nNetwork topology and a partial routing table\n\nNetwork topology and a partial routing table is shown.\nFortiGate has already been configured with a firewall policy that allows all ICMP traffic to flow from port1 to port3.\nWhich two changes can the administrator perform to ensure the server at 10.4.0.1/24 receives the echo reply from the laptop at 10.1.0.1/24? (Choose two.)",
    "options": [
      "A. Modify the default gateway on the laptop from 10.1.0.2 to 10.1.0.254.",
      "B. Change the FortiGate configuration from strict RPF check mode to feasible RPF check mode.",
      "C. Enable asymmetric routing under config system settings.",
      "D. Add a default static route on FortiGate to forward all traffic to port3."
    ],
    "answer": "A, C",
    "explanation": "<p><strong>Q14 正確答案：A, C</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> Routing &amp; Architecture [Asymmetric Routing &amp; RPF (Reverse Path Forwarding)]</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>這是一題經典的「非對稱路由 (Asymmetric Routing)」與「反向路徑轉發 (RPF)」排障題。我們需要先透過拓樸圖與路由表，釐清封包的來回傳輸路徑：</p>\n<p>1. <strong>ICMP Echo Request (去程)：</strong> 伺服器 (10.4.0.1) 發出請求，經過右側路由器到達 FortiGate 的 <code class=\"bg-slate-100 px-1 rounded text-xs\">port3</code>。FortiGate 查表後，將封包從 <code class=\"bg-slate-100 px-1 rounded text-xs\">port1</code> 轉發給筆電 (10.1.0.1)。此時 FortiGate 建立了一條 Session，預期回覆封包應該要從 <code class=\"bg-slate-100 px-1 rounded text-xs\">port1</code> 回來。</p>\n<p>2. <strong>ICMP Echo Reply (回程)：</strong> 筆電收到請求後準備回覆，但筆電的預設閘道 (Default Gateway) 設定為 <code class=\"bg-slate-100 px-1 rounded text-xs\">10.1.0.2</code>（即左側路由器）。左側路由器收到回覆封包後，將其從 <code class=\"bg-slate-100 px-1 rounded text-xs\">port2</code> (10.2.0.2) 轉發到了 FortiGate 的 <code class=\"bg-slate-100 px-1 rounded text-xs\">port2</code> (10.2.0.1)。</p>\n<div class=\"h-2\"></div>\n<p>這導致了嚴重的問題：<strong>去程從 <code class=\"bg-slate-100 px-1 rounded text-xs\">port1</code> 出，回程卻從 <code class=\"bg-slate-100 px-1 rounded text-xs\">port2</code> 進</strong>。</p>\n<p>在 FortiGate 預設的狀態檢測 (Stateful Inspection) 與嚴格 RPF 檢查機制下，這個從 <code class=\"bg-slate-100 px-1 rounded text-xs\">port2</code> 進來的回程封包會遭遇兩個阻礙：</p>\n<p>1. <strong>Session 不匹配：</strong> 封包進入的介面與 Session Table 紀錄的介面不符。</p>\n<p>2. <strong>RPF 檢查失敗：</strong> FortiGate 收到來源 IP 為 10.1.0.1 的封包於 <code class=\"bg-slate-100 px-1 rounded text-xs\">port2</code>，但路由表顯示前往 10.1.0.0/24 的介面是 <code class=\"bg-slate-100 px-1 rounded text-xs\">port1</code>，因此 Strict RPF 檢查失敗，封包被丟棄。</p>\n<div class=\"h-2\"></div>\n<p>為了解決這個問題，網管工程師可以採取以下兩種方式之一（即選項 A 與 C）：</p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A (Modify the default gateway on the laptop from 10.1.0.2 to 10.1.0.254)：</strong> 這是「從網路架構面」根本解決問題的方法。將筆電的預設閘道直接改為 FortiGate 的 <code class=\"bg-slate-100 px-1 rounded text-xs\">port1</code> IP (10.1.0.254)。這樣一來，回程封包就會直接回到 <code class=\"bg-slate-100 px-1 rounded text-xs\">port1</code>，達成<strong>對稱路由 (Symmetric Routing)</strong>。封包進出介面一致，完美符合 Session 狀態並通過 RPF 檢查。</li>\n<li><strong>選項 C (Enable asymmetric routing under config system settings)：</strong> 這是「從防火牆設定面」妥協的方法。如果不能更改終端設備的閘道，只能在 FortiGate 的全域設定中啟用非對稱路由 (<code class=\"bg-slate-100 px-1 rounded text-xs\">set asymmetric-routing enable</code>)。開啟此功能後，FortiGate 會放寬介面狀態檢測的綁定，並且會<strong>自動繞過 RPF 檢查</strong>，從而允許從 <code class=\"bg-slate-100 px-1 rounded text-xs\">port2</code> 進入的回程封包被順利接收並轉發給 <code class=\"bg-slate-100 px-1 rounded text-xs\">port3</code> 的伺服器。</li>\n</ul>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 B (Change the FortiGate configuration from strict RPF check mode to feasible RPF check mode)：</strong></li>\n</ul>\n<p>  錯誤。Feasible RPF 檢查的條件是：「只要路由表中有『任何一條』指向該來源 IP 的路由是走封包進入的介面即可」。但根據題目提供的路由表，FortiGate 只有一條直連路由前往 10.1.0.0/24 (<code class=\"bg-slate-100 px-1 rounded text-xs\">port1</code>)，<strong>完全沒有</strong>透過 <code class=\"bg-slate-100 px-1 rounded text-xs\">port2</code> 前往 10.1.0.0/24 的路由。因此，即使降級為 Feasible RPF，檢查依然會失敗。此外，單純改 RPF 也無法解決 Session 介面不匹配的狀態檢測問題。</p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 D (Add a default static route on FortiGate to forward all traffic to port3)：</strong></li>\n</ul>\n<p>  錯誤。FortiGate 的路由表中已經有明確的靜態路由 <code class=\"bg-slate-100 px-1 rounded text-xs\">10.4.0.0/24 via port3</code>，代表它已經知道如何將封包送回給伺服器了。現在的問題癥結點在於「FortiGate 拒絕從錯誤介面 (<code class=\"bg-slate-100 px-1 rounded text-xs\">port2</code>) 接收筆電的封包」，增加去往伺服器的路由對於解決來源介面錯誤的問題毫無幫助。</p>",
    "images": [
      "q14a.jpg"
    ]
  },
  {
    "id": 15,
    "q_en": "Refer to the exhibit.\nThe output of the get router info bgp summary command is shown.\n\nWhich statement regarding adjacencies between the local router and its neighbors is correct?",
    "options": [
      "A. The local router and neighbor 100.64.2.254 are unable to establish adjacency because AS 100 is already used by neighbor 100.64.1.254.",
      "B. The local router and neighbor 100.64.2.254 are unable to establish adjacency until the adjacency with neighbor 100.64.1.254 ceases.",
      "C. The local router and neighbor 100.64.2.254 are unable to establish adjacency because the TCP session could not be established.",
      "D. The local router and neighbor 100.64.1.254 established adjacency because the priority of 100.64.1.254 is higher than that of 100.64.2.254."
    ],
    "answer": "C",
    "explanation": "<p><strong>Q15 正確答案：C</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> Routing &amp; Architecture [BGP States &amp; Troubleshooting]</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>在解讀 <code class=\"bg-slate-100 px-1 rounded text-xs\">get router info bgp summary</code> 指令輸出時，<code class=\"bg-slate-100 px-1 rounded text-xs\">State/PfxRcd</code> 欄位是判斷 BGP 鄰居狀態的核心。</p>\n<p>觀察輸出表單中鄰居 <code class=\"bg-slate-100 px-1 rounded text-xs\">100.64.2.254</code> 的狀態：</p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><code class=\"bg-slate-100 px-1 rounded text-xs\">MsgRcvd</code> 與 <code class=\"bg-slate-100 px-1 rounded text-xs\">MsgSent</code> 皆為 0。</li>\n<li><code class=\"bg-slate-100 px-1 rounded text-xs\">Up/Down</code> 顯示為 <code class=\"bg-slate-100 px-1 rounded text-xs\">never</code>。</li>\n<li><code class=\"bg-slate-100 px-1 rounded text-xs\">State/PfxRcd</code> 顯示為 <strong><code class=\"bg-slate-100 px-1 rounded text-xs\">Active</code></strong>。</li>\n</ul>\n<div class=\"h-2\"></div>\n<p>在 BGP 的狀態機 (Finite State Machine) 中，<strong><code class=\"bg-slate-100 px-1 rounded text-xs\">Active</code> 狀態代表本地路由器正在嘗試與遠端 Peer 建立 TCP 連線 (TCP Port 179)</strong>。如果這個狀態持續停滯在 <code class=\"bg-slate-100 px-1 rounded text-xs\">Active</code>，且收發訊息數皆為 0，這明確表示底層的 TCP 三向交握 (Three-way Handshake) 失敗了（可能是因為路由不可達、防火牆阻擋了 Port 179 或是 Peer IP 設定錯誤）。因此，無法建立 adjacency 的主因是 TCP session 無法成功建立。</p>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A（無法建立是因為 AS 100 已經被 100.64.1.254 使用了）：</strong> 錯誤觀念。在 BGP 架構中，本地路由器完全可以跟多個隸屬於同一個 AS 的鄰居建立 Peering（例如 iBGP 叢集，或是連接到同一個遠端 AS 的多條實體線路 eBGP）。AS 號碼重複並不會阻止鄰居關係的建立。</li>\n<li><strong>選項 B（必須等到與 100.64.1.254 的連線中斷後才能建立）：</strong> 錯誤觀念。BGP 的每個鄰居連線都是獨立的 TCP Session，系統完全支援且鼓勵多條 BGP 連線同時並存以達成路由備援與負載平衡，不需要排隊或等待其他連線中斷。</li>\n<li><strong>選項 D（100.64.1.254 能建立是因為它的優先權比較高）：</strong> 錯誤。BGP 建立鄰居關係並不是基於「優先權 (Priority)」的選舉機制（這與 OSPF 選擇 DR/BDR 的機制不同）。只要 TCP 能連通且 BGP OPEN 參數（如 ASN、Router ID 等）驗證通過，鄰居關係就會建立。輸出中 100.64.1.254 的狀態是 <code class=\"bg-slate-100 px-1 rounded text-xs\">1</code>（代表已進入 Established 狀態並收到 1 條路由），這單純是因為它的 TCP 連線與 BGP 協商成功了。</li>\n</ul>",

    ]
  },

    "id": 16,
    "q_en": "Refer to the exhibits.\n\nExhibit 1 -\n\n\nExhibit 2 -\n\nThe configuration on FortiGate and partial internet session information from a user on the internal network are shown.\nAn administrator would like to test session failover between the two service provider connections.\nWhich two changes must the administrator make to force this existing session to immediately start using the other interface? (Choose two.)",
    "options": [
      "A. Modify the distance of the port1 route to 1.",
      "B. Change the priority of the port1 static route to 11.",
      "C. Configure set snat-route-change enable.",
      "D. Change the priority of the port2 static route to 5."
    ],
    "answer": "B, C",
    "explanation": "<p><strong>Q16 正確答案：B, C</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> Routing &amp; Architecture [Session Failover &amp; SNAT Route Change]</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>這題的情境是網管人員希望測試「現有已經建立的連線 (existing session)」在雙 ISP 線路間的容錯移轉 (Failover)。要達成這個目的，必須同時滿足「路由條件的改變」以及「系統對既有 SNAT 連線的處理行為改變」：</p>\n<div class=\"h-2\"></div>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 C (Configure set snat-route-change enable)：</strong> 這是最關鍵的一步。在 FortiOS 的預設行為中，為了避免使用者的對外來源 IP 突然改變而導致應用程式斷線，系統預設為 <code class=\"bg-slate-100 px-1 rounded text-xs\">set snat-route-change disable</code>（如 Exhibit 1 所示）。這意味著一旦 Session 建立且經過了 SNAT，即使路由表發生變動，該 Session 依然會「黏 (stick)」在原來的介面上。要強迫<strong>已經存在的 SNAT Session</strong> 立刻重新評估路由並切換到新介面，必須在全域設定將此參數改為 <code class=\"bg-slate-100 px-1 rounded text-xs\">enable</code>。</li>\n<li><strong>選項 B (Change the priority of the port1 static route to 11)：</strong> 在 Exhibit 1 中，<code class=\"bg-slate-100 px-1 rounded text-xs\">port1</code> 的優先權 (Priority) 為 5，<code class=\"bg-slate-100 px-1 rounded text-xs\">port2</code> 為 10。數字越小越優先，因此目前流量走 <code class=\"bg-slate-100 px-1 rounded text-xs\">port1</code>。為了強迫流量切換到另一條線路 (<code class=\"bg-slate-100 px-1 rounded text-xs\">port2</code>)，我們必須讓 <code class=\"bg-slate-100 px-1 rounded text-xs\">port2</code> 成為最佳路由。將 <code class=\"bg-slate-100 px-1 rounded text-xs\">port1</code> 的優先權調高至 11（大於 <code class=\"bg-slate-100 px-1 rounded text-xs\">port2</code> 的 10），路由表就會判定 <code class=\"bg-slate-100 px-1 rounded text-xs\">port2</code> 為唯一最佳路徑，進而觸發路由改變事件。</li>\n</ul>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A (Modify the distance of the port1 route to 1)：</strong> 錯誤。管理距離 (Administrative Distance) 預設靜態路由為 10。如果你將 <code class=\"bg-slate-100 px-1 rounded text-xs\">port1</code> 的 distance 改為 1（數值越小越優先），這只會讓 <code class=\"bg-slate-100 px-1 rounded text-xs\">port1</code> 的路由變得<strong>更加優先</strong>，完全背離了我們要將流量切換到 <code class=\"bg-slate-100 px-1 rounded text-xs\">port2</code> 的目標。</li>\n<li><strong>選項 D (Change the priority of the port2 static route to 5)：</strong> 錯誤。如果將 <code class=\"bg-slate-100 px-1 rounded text-xs\">port2</code> 的優先權也改成 5，這會與 <code class=\"bg-slate-100 px-1 rounded text-xs\">port1</code> 形成 ECMP (Equal-Cost Multi-Path，等價多重路徑) 負載平衡。在 ECMP 的情況下，因為 <code class=\"bg-slate-100 px-1 rounded text-xs\">port1</code> 也是合法且最佳的路徑之一，原先已經走在 <code class=\"bg-slate-100 px-1 rounded text-xs\">port1</code> 上的 Session 並不會被「強迫 (force)」切換到另一個介面。必須讓 <code class=\"bg-slate-100 px-1 rounded text-xs\">port2</code> 成為<strong>唯一</strong>的最佳路由，才能保證流量 100% 移轉。</li>\n</ul>",
    "images": [
      "q16a.jpg",
      "q16b.jpg"
    ]
  },

    "q_en": "Refer to the exhibit.\nThe output from a collector agent log is shown.\n\nThe collector agent is showing the status of a workstation as \"Not Verified\".\nWhat are two common causes for this message? (Choose two.) (VS 13)",
    "options": [
      "A. DNS cannot resolve the workstation name.",
      "B. Traffic to port 139 and 445 is blocked.",
      "C. The workstation remote registry is not running.",
      "D. The workstation has come out of hibernate mode."
    ],
    "answer": "B, C",
    "explanation": "<p><strong>Q17 正確答案：B, C</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> FSSO (Fortinet Single Sign-On) [Workstation Check / Troubleshooting]</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>在 FSSO 的架構中，Collector Agent 為了確保使用者列表的準確性並偵測使用者是否已經登出，會定期對使用者的工作站進行「Workstation Check（工作站檢查）」。這個檢查機制主要依賴 Windows 的 <strong>Remote Registry (遠端登錄服務)</strong> 或 <strong>WMI (Windows Management Instrumentation)</strong>，並且透過 <strong>TCP Port 139 (NetBIOS) 與 445 (SMB)</strong> 來進行通訊。</p>\n<div class=\"h-2\"></div>\n<p>當除錯日誌出現 <code class=\"bg-slate-100 px-1 rounded text-xs\">failed to connect to workstation</code> 以及 <code class=\"bg-slate-100 px-1 rounded text-xs\">cannot get UserName</code>，且使用者的狀態變成「Not Verified (未驗證)」時，最常見的兩個原因就是：</p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 B (Traffic to port 139 and 445 is blocked)：</strong> Collector Agent 發出的探測封包如果在途中被網路防火牆阻擋，或是被端點的 Windows Defender 防火牆擋下，就會無法與工作站建立連線，導致狀態變成未驗證。</li>\n<li><strong>選項 C (The workstation remote registry is not running)：</strong> 即使網路連線 (Port 139/445) 是通的，如果 Windows 工作站本機上的「Remote Registry」服務被停用或沒有啟動，Collector Agent 依然無法讀取工作站的登錄檔來獲取當前登入的使用者資訊。</li>\n</ul>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A (DNS cannot resolve the workstation name)：</strong> 錯誤。從除錯日誌 <code class=\"bg-slate-100 px-1 rounded text-xs\">failed to connect to workstation:10.0.155.23 (10.0.155.23)</code> 可以清楚看到，Collector Agent 已經直接使用 IP 位址 (10.0.155.23) 去嘗試連線了。這表示問題並非出在 DNS 名稱解析，而是實際的連線傳輸或服務層級遭到拒絕。</li>\n<li><strong>選項 D (The workstation has come out of hibernate mode)：</strong> 錯誤。當工作站從休眠模式恢復時，通常會重新建立網路連線並可能觸發新的登入事件 (Logon Event) 讓 DC 記錄，這反而有助於 FSSO 狀態的更新。休眠恢復本身並不會造成 <code class=\"bg-slate-100 px-1 rounded text-xs\">Connection refused</code> 或長期維持在 <code class=\"bg-slate-100 px-1 rounded text-xs\">Not Verified</code> 的連線失敗狀態，核心問題仍然是網路不通或本機端服務未開啟。</li>\n</ul>",
    "images": [
      "q17a.jpg"
    ]
  },
  {
    "id": 18,
    "q_en": "Refer to the exhibit.\nThe output of a BGP debug command is shown.\n\nWhy has the local router at 172.16.23.58 been unable to establish adjacency with its only neighbor?",
    "options": [
      "A. The local router has not received an OPEN message from the neighbor.",
      "B. There is no active route to the BGP neighbor.",
      "C. The neighbor router has become unreachable, which is evident by the low ratio of messages received to messages sent.",
      "D. The local router has not received a SYN/ACK packet from the neighbor."
    ],
    "answer": "D",
    "explanation": "<p><strong>Q18 正確答案：D</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> Routing &amp; Architecture [BGP Finite State Machine (FSM) &amp; Troubleshooting]</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>要正確診斷 BGP 的連線問題，我們必須非常熟悉 BGP 的狀態機 (Finite State Machine, FSM)。在您提供的輸出日誌中，請特別注意該鄰居（172.16.23.153）目前的狀態 (<code class=\"bg-slate-100 px-1 rounded text-xs\">State/PfxRcd</code>) 顯示為 <strong><code class=\"bg-slate-100 px-1 rounded text-xs\">Connect</code></strong>。</p>\n<div class=\"h-2\"></div>\n<p>在 BGP 建立鄰居關係的過程中，當路由器處於 <code class=\"bg-slate-100 px-1 rounded text-xs\">Connect</code> 狀態時，代表它正在<strong>等待底層的 TCP 三向交握（Three-way Handshake）完成</strong>。具體來說，本地路由器已經向外發送了 TCP SYN 封包，目前正苦苦等待遠端鄰居回覆 <strong>TCP SYN/ACK 封包</strong>。如果遲遲收不到 SYN/ACK（可能是因為中間有防火牆阻擋了 TCP Port 179，或是對方根本沒有啟動 BGP 服務），狀態就會一直卡在 <code class=\"bg-slate-100 px-1 rounded text-xs\">Connect</code> 或轉為 <code class=\"bg-slate-100 px-1 rounded text-xs\">Active</code> 狀態重新嘗試。因此，無法建立 adjacency 的最直接原因就是尚未收到 SYN/ACK。</p>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A（The local router has not received an OPEN message from the neighbor.）：</strong> 錯誤。BGP 必須先完成 TCP 連線（進入 <code class=\"bg-slate-100 px-1 rounded text-xs\">OpenSent</code> 狀態），才會開始交換 BGP OPEN 訊息。目前的狀態還停留在更早期的 <code class=\"bg-slate-100 px-1 rounded text-xs\">Connect</code> 階段，連 TCP 都還沒建起來，根本還沒資格討論 OPEN 訊息。</li>\n<li><strong>選項 B（There is no active route to the BGP neighbor.）：</strong> 錯誤。如果本地路由器完全沒有前往鄰居的路由，BGP 狀態通常會直接卡在 <code class=\"bg-slate-100 px-1 rounded text-xs\">Idle</code>（甚至無法發起 TCP 連線）。既然狀態已經推進到了 <code class=\"bg-slate-100 px-1 rounded text-xs\">Connect</code>，代表路由器有路由可以將封包送出去，只是對方沒有正確回應 TCP 交握。</li>\n<li><strong>選項 C（The neighbor router has become unreachable, which is evident by the low ratio of messages received to messages sent.）：</strong> 錯誤。雖然輸出中顯示 <code class=\"bg-slate-100 px-1 rounded text-xs\">MsgSent</code> (3220) 遠大於 <code class=\"bg-slate-100 px-1 rounded text-xs\">MsgRcvd</code> (218)，但這只是過去的歷史計數，可能代表該連線曾經建立過並發生過不穩定的狀況。然而，針對「現在為什麼無法建立 (why has the local router been unable to establish)」這個問題，最精確的技術診斷指標是目前的狀態 <code class=\"bg-slate-100 px-1 rounded text-xs\">Connect</code>，而非訊息數量的比例。</li>\n</ul>",
    "images": [
      "q18a.jpg"
    ]
  },
  {
    "id": 19,
    "q_en": "Refer to the exhibit.\n\nAn administrator has configured a firewall policy to use proxy-based inspection mode.\nWhat could explain the messages observed in the debug flow output?",
    "options": [
      "A. The FTP protocol has not yet been mapped to port 211 under Protocol Options.",
      "B. FortiGate does not have enough free memory to perform proxy-based inspections.",
      "C. At least one protocol port under Protocol Options has been mapped to Any.",
      "D. SSL deep inspection is not configured."
    ],
    "answer": "A",
    "explanation": "<p><strong>Q19 正確答案：A</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> Security Profiles [Inspection Modes &amp; Protocol Options]</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>這題考驗的是防火牆在 <strong>Proxy-based (代理模式)</strong> 下的底層運作機制。</p>\n<p>當我們將防火牆策略設定為 Proxy-based 模式時，FortiGate 必須依賴 <strong>Protocol Options (通訊協定選項)</strong> 來決定要將哪個 Destination Port 的流量交給對應的代理服務 (Proxy daemon，例如 WAD) 來處理（例如預設 TCP 80 交給 HTTP Proxy，TCP 21 交給 FTP Proxy）。</p>\n<div class=\"h-2\"></div>\n<p>如果流量的目標埠（根據題目與選項的提示，使用者將 FTP 架設在非標準的 Port 211 或 212）<strong>沒有</strong>在 Protocol Options 中被明確對應到 FTP 協定，FortiGate 就不知道該把這個封包交給 FTP Proxy 處理。</p>\n<p>在此情況下，FortiOS 的設計<strong>不會</strong>將封包丟棄，而是會<strong>「降級回退 (Fallback)」到 Flow-based (流模式)</strong> 進行檢測。</p>\n<div class=\"h-2\"></div>\n<p>觀察除錯日誌 (Debug Flow)：</p>\n<p>1. 封包進入策略並允許放行：<code class=\"bg-slate-100 px-1 rounded text-xs\">Allowed by Policy-1: SNAT</code></p>\n<p>2. 關鍵日誌：<code class=\"bg-slate-100 px-1 rounded text-xs\">func ids receive Line-466 mag-send to ips</code></p>\n<p>   這裡的 <code class=\"bg-slate-100 px-1 rounded text-xs\">send to ips</code> 代表封包被送往了底層的 <strong>IPS Engine (流模式檢測引擎)</strong>，而不是應用層的代理服務 (如果是送往代理，日誌會顯示 <code class=\"bg-slate-100 px-1 rounded text-xs\">send to application layer</code>)。</p>\n<p>3. <code class=\"bg-slate-100 px-1 rounded text-xs\">run helper-ftp</code>：系統透過 Session Helper 識別出了它是 FTP 流量，但因為 Protocol Options 沒有配置對應的 Port，所以只能丟給 IPS 引擎進行流模式掃描。</p>\n<div class=\"h-2\"></div>\n<p>因此，A 選項精確地描述了這個現象：因為 FTP 尚未在 Protocol Options 中映射到該非標準 Port，導致無法觸發 Proxy 檢查而回退到 IPS。</p>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 B (FortiGate does not have enough free memory...)：</strong> 錯誤。如果 FortiGate 因為記憶體耗盡進入 Conserve Mode，系統的行為會取決於 failopen 設定（直接丟棄封包或完全略過安全檢查），但並不會在除錯日誌中表現出正常建立 Session、執行 SNAT 並且 <code class=\"bg-slate-100 px-1 rounded text-xs\">send to ips</code>。記憶體不足的特徵通常會有 <code class=\"bg-slate-100 px-1 rounded text-xs\">memory_tension_drop</code> 等相關錯誤日誌。</li>\n<li><strong>選項 C (At least one protocol port under Protocol Options has been mapped to Any)：</strong> 錯誤。將 Protocol Options 裡的 Port 設為 <code class=\"bg-slate-100 px-1 rounded text-xs\">Any</code> 代表該協定的代理可以接管任意 Port 上被識別出的流量。如果真的設為 Any，FortiGate 應該會成功觸發 Proxy-based 檢測（送往 Application Layer），而不是像日誌中那樣被降級送到 IPS (Flow-based)。</li>\n<li><strong>選項 D (SSL deep inspection is not configured)：</strong> 錯誤。這是一個完全無關的干擾選項。目前的流量是 FTP (明文傳輸或 Explicit FTPS)，退一步說，無論有沒有設定 SSL 深層檢測，都不會是導致 Proxy-based 策略把封包丟給流模式 IPS 引擎 (<code class=\"bg-slate-100 px-1 rounded text-xs\">send to ips</code>) 的根本原因。</li>\n</ul>",
    "images": [
      "q19a.jpg"
    ]

  {
    "id": 20,
    "q_en": "Which two statements about Security Fabric communications are true? (Choose two.)",
    "options": [
      "A. The default ports for FortiTelemetry and Neighbor Discovery can be modified.",
      "B. Security Fabric communication is enabled by default among all Fortinet devices.",
      "C. FortiTelemetry must be manually enabled on the FortiGate interface.",
      "D. By default, the downstream FortiGate establishes a connection with the upstream FortiGate using TCP port 8013."
    ],
    "answer": "C, D",
    "explanation": "<p><strong>Q20 正確答案：C, D</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> Security Fabric [Fabric Communications]</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>要讓 Fortinet Security Fabric 順利運作，必須滿足特定的通訊條件與介面設定：</p>\n<div class=\"h-2\"></div>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 C (FortiTelemetry must be manually enabled on the FortiGate interface)：</strong> 正確。預設情況下，FortiGate 介面上的 FortiTelemetry (或在較新版本中稱為 Security Fabric Connection) 是關閉的。為了讓上游 (Upstream) 與下游 (Downstream) 設備能夠互相通訊，網管工程師必須手動進入「Network &gt; Interfaces」，在用於 Fabric 連線的實體或邏輯介面上，勾選並啟用 <code class=\"bg-slate-100 px-1 rounded text-xs\">Security Fabric Connection</code>（這包含了 FortiTelemetry 的存取權限），否則設備將拒絕 Fabric 的連線請求。</li>\n<li><strong>選項 D (By default, the downstream FortiGate establishes a connection with the upstream FortiGate using TCP port 8013)：</strong> 正確。在 Security Fabric 的拓樸中，總是由「下游設備 (Downstream)」主動向「上游設備 (Upstream / Root)」發起連線來加入織網。這個底層同步與遙測資料傳輸的預設通訊埠正是 <strong>TCP Port 8013</strong>。</li>\n</ul>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A (The default ports for FortiTelemetry and Neighbor Discovery can be modified)：</strong> 錯誤。這是一個設計上的限制陷阱題。雖然 FortiTelemetry 的通訊埠 (TCP 8013) 可以在設定中修改，但是用於設備自動探索的 <strong>Neighbor Discovery 協定通訊埠是固定的，無法被修改</strong>。因此選項 A 說兩者皆可修改是錯誤的。</li>\n<li><strong>選項 B (Security Fabric communication is enabled by default among all Fortinet devices)：</strong> 錯誤。Security Fabric 不會「開箱即用」自動跨設備通訊。你必須進行一連串的設定：包含指定 Root 設備、設定 Group Name 與 Password、在兩端介面上開啟 FortiTelemetry 權限，並且在 Root 端手動授權 (Authorize) 該下游設備。預設狀態下，Fabric 連線是處於未配置且關閉的狀態。</li>\n</ul>",
    "images": []
  },
  {
    "id": 21,
    "q_en": "Refer to the exhibit.\n\nDebug output -\n\nThe output of the command diagnose vpn tunnel list is shown.\nReviewing the debug command, what is the current status of the traffic flowing through the tunnel?",
    "options": [
      "A. NP6 is handling the offloading.",
      "B. The inbound IPsec SA was copied to the NPU.",
      "C. The outbound IPsec SA was copied to the NPU.",
      "D. The inbound and outbound IPsec SAs were copied to the NPU."
    ],
    "answer": "B",
    "explanation": "<p><strong>Q21 正確答案：B</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> IPsec VPN [NPU Offloading &amp; Hardware Acceleration]</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>在 FortiGate 進行 IPsec VPN 排障時，<code class=\"bg-slate-100 px-1 rounded text-xs\">diagnose vpn tunnel list</code> 是一個非常重要的指令。在該指令的輸出中，最後一行的 <code class=\"bg-slate-100 px-1 rounded text-xs\">npu_flag</code> 參數直接反映了該 VPN 隧道的安全關聯（Security Associations, SAs）是否有成功寫入網路處理器（NPU）以進行硬體加速卸載（Offloading）。</p>\n<div class=\"h-2\"></div>\n<p><code class=\"bg-slate-100 px-1 rounded text-xs\">npu_flag</code> 的數值定義如下：</p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong><code class=\"bg-slate-100 px-1 rounded text-xs\">npu_flag=00</code></strong>：沒有硬體卸載（Inbound 與 Outbound 皆由 CPU 處理）。</li>\n<li><strong><code class=\"bg-slate-100 px-1 rounded text-xs\">npu_flag=01</code></strong>：只有 <strong>Outbound</strong>（加密/傳送端）的 SA 成功複製到 NPU。</li>\n<li><strong><code class=\"bg-slate-100 px-1 rounded text-xs\">npu_flag=02</code></strong>：只有 <strong>Inbound</strong>（解密/接收端）的 SA 成功複製到 NPU。</li>\n<li><strong><code class=\"bg-slate-100 px-1 rounded text-xs\">npu_flag=03</code></strong>：雙向的 Inbound 與 Outbound SAs 皆成功複製到 NPU 進行完全硬體加速。</li>\n</ul>\n<div class=\"h-2\"></div>\n<p>根據題目提供的除錯輸出日誌，顯示為 <strong><code class=\"bg-slate-100 px-1 rounded text-xs\">npu_flag=02</code></strong>，並且後方的資訊為 <code class=\"bg-slate-100 px-1 rounded text-xs\">dec_npuid=1 enc_npuid=0</code>（解密交由 NPU 處理，加密引擎 NPU ID 為 0 代表未卸載）。這明確證明了目前只有 <strong>Inbound IPsec SA</strong> 被成功複製到 NPU 進行硬體卸載。</p>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A（NP6 is handling the offloading）：</strong> 錯誤。這個描述過於籠統。雖然 NPU 負責卸載，但此選項並未精確點出目前只有「單向（Inbound）」被卸載的關鍵狀態。此外，光憑這段輸出無法絕對確認底層晶片一定是 NP6（也可能是 NP7 等其他型號），最直接的證據是 SA 的傳輸方向狀態。</li>\n<li><strong>選項 C（The outbound IPsec SA was copied to the NPU）：</strong> 錯誤。如果 Outbound SA 有成功卸載，<code class=\"bg-slate-100 px-1 rounded text-xs\">npu_flag</code> 應該包含 01 的數值（例如 <code class=\"bg-slate-100 px-1 rounded text-xs\">01</code> 或雙向的 <code class=\"bg-slate-100 px-1 rounded text-xs\">03</code>），且 <code class=\"bg-slate-100 px-1 rounded text-xs\">enc_npuid</code> 會顯示非 0 的 NPU ID。</li>\n<li><strong>選項 D（The inbound and outbound IPsec SAs were copied to the NPU）：</strong> 錯誤。若雙向皆已成功完成硬體加速，<code class=\"bg-slate-100 px-1 rounded text-xs\">npu_flag</code> 的值必須為 <strong><code class=\"bg-slate-100 px-1 rounded text-xs\">03</code></strong>。目前的 <code class=\"bg-slate-100 px-1 rounded text-xs\">02</code> 僅代表接收端的流量被加速。</li>\n</ul>",
    "images": [
      "q21a.jpg"
    ]
  },
  {
    "id": 22,
    "q_en": "Refer to the exhibit.\n\nWhich three pieces of information does the diagnose sys top command provide? (Choose three.)",
    "options": [
      "A. The miglogd daemon is running on CPU core ID 0.",
      "B. The cmdbsvr process is occupying 2.4% of the total user memory space.",
      "C. The diagnose sys top command has been running for 18 minutes.",
      "D. If the newcli daemon continues to be in the R state, it will need to be manually restarted.",
      "E. The miglogd daemon would be on top of the list, if the administrator pressed m on the keyboard."
    ],
    "answer": "A, B, E",
    "explanation": "<p><strong>Q22 正確答案：A, B, E</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> System Resources [Monitoring Processes / <code class=\"bg-slate-100 px-1 rounded text-xs\">diagnose sys top</code>]</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p><code class=\"bg-slate-100 px-1 rounded text-xs\">diagnose sys top</code> 是 FortiGate 系統中用來即時監控系統資源與各項程序 (Process) 狀態的核心指令。預設的輸出欄位依序通常為：<code class=\"bg-slate-100 px-1 rounded text-xs\">程序名稱 (Process Name)</code>、<code class=\"bg-slate-100 px-1 rounded text-xs\">程序識別碼 (PID)</code>、<code class=\"bg-slate-100 px-1 rounded text-xs\">狀態 (State)</code>、<code class=\"bg-slate-100 px-1 rounded text-xs\">CPU 使用率 (%)</code>、<code class=\"bg-slate-100 px-1 rounded text-xs\">記憶體使用率 (%)</code> 以及 <code class=\"bg-slate-100 px-1 rounded text-xs\">CPU 核心編號 (CPU Core ID)</code>。</p>\n<div class=\"h-2\"></div>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A (The miglogd daemon is running on CPU core ID 0)：</strong> 正確。觀察輸出列表中 <code class=\"bg-slate-100 px-1 rounded text-xs\">miglogd</code> 所在的行，最後一個數字（欄位）為 <code class=\"bg-slate-100 px-1 rounded text-xs\">0</code>，這明確代表該日誌守護程序目前被分配並運行在編號為 0 的 CPU 核心上。</li>\n<li><strong>選項 B (The cmdbsvr process is occupying 2.4% of the total user memory space)：</strong> 正確。觀察列表中 <code class=\"bg-slate-100 px-1 rounded text-xs\">cmdbsvr</code> 所在的行，倒數第二個欄位（代表 Memory Usage）數值為 <code class=\"bg-slate-100 px-1 rounded text-xs\">2.4</code>，代表該程序目前佔用了系統約 2.4% 的記憶體空間。</li>\n<li><strong>選項 E (The miglogd daemon would be on top of the list, if the administrator pressed m on the keyboard)：</strong> 正確。<code class=\"bg-slate-100 px-1 rounded text-xs\">diagnose sys top</code> 預設是依照「CPU 使用率 (CPU usage)」由高至低進行排序（也可以按 <code class=\"bg-slate-100 px-1 rounded text-xs\">p</code> 鍵切換回此模式）。如果在執行期間按下鍵盤的 <strong><code class=\"bg-slate-100 px-1 rounded text-xs\">m</code> 鍵</strong>，系統會改為依照「記憶體使用率 (Memory usage)」排序。檢視列表中的記憶體數值，<code class=\"bg-slate-100 px-1 rounded text-xs\">miglogd</code> 佔用了 <code class=\"bg-slate-100 px-1 rounded text-xs\">6.8%</code>，是畫面中所有程序裡記憶體耗用最高的。因此，按下 <code class=\"bg-slate-100 px-1 rounded text-xs\">m</code> 後，它會被拉到列表的最上方。</li>\n</ul>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 C (The diagnose sys top command has been running for 18 minutes)：</strong> 錯誤。這是一個非常常見的觀念混淆陷阱。輸出最上方的 <code class=\"bg-slate-100 px-1 rounded text-xs\">Run Time: 0 days, 0 hours and 18 minutes</code> 指的是 <strong>FortiGate 設備的系統開機運行時間 (System Uptime)</strong>，也就是這台防火牆開機到現在才過了 18 分鐘，<strong>絕對不是</strong>指這個除錯指令已經跑了 18 分鐘。</li>\n<li><strong>選項 D (If the newcli daemon continues to be in the R state, it will need to be manually restarted)：</strong> 錯誤。在程序狀態 (State) 欄位中，<strong><code class=\"bg-slate-100 px-1 rounded text-xs\">R</code> 代表的是 Running（運行中）或 Runnable（可運行）</strong>。這是完全正常的狀態，表示該程序正在 CPU 上積極執行任務（此處通常是管理員正在使用 CLI）。真正需要注意的異常狀態通常是 <code class=\"bg-slate-100 px-1 rounded text-xs\">Z</code> (Zombie，僵屍程序) 或 <code class=\"bg-slate-100 px-1 rounded text-xs\">D</code> (Uninterruptible sleep，深度睡眠卡死)，處於 <code class=\"bg-slate-100 px-1 rounded text-xs\">R</code> 狀態絕對不需要手動重啟。</li>\n</ul>",
    "images": [
      "q22a.jpg"
    ]
  },
  {
    "id": 23,
    "q_en": "Refer to the exhibit.\n\nReal-time OSPF debug output -\n\nPartial output of a real-time OSPF debug is shown.\nWhich two reasons explain why the two FortiGate devices are unable to form an adjacency? (Choose two.)",
    "options": [
      "A. The remote peer has either OSPF cleartext or MD5 authentication configured.",
      "B. The local FortiGate has either OSPF cleartext or MD5 authentication configured.",
      "C. There is an OSPF authentication configuration mismatch.",
      "D. The local FortiGate does not have OSPF authentication configured."
    ],
    "answer": "B, C",
    "explanation": "<p><strong>Q23 正確答案：B, C</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> Troubleshooting Concepts [OSPF Adjacency &amp; Authentication]</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>要成功建立 OSPF 鄰居關係，雙方的 OSPF 驗證設定（Authentication Type 與 Key）必須完全一致。根據題目提供的 <code class=\"bg-slate-100 px-1 rounded text-xs\">real-time OSPF debug</code> 輸出，當本地 FortiGate 收到遠端對方的 Hello 封包時，系統回報了關鍵錯誤：<strong><code class=\"bg-slate-100 px-1 rounded text-xs\">OSPF: RECV [Hello]: From 0.0.0.112 via port2:192.168.37.114: Authentication type mismatch</code></strong>。</p>\n<div class=\"h-2\"></div>\n<p>這個訊息明確指出雙方在「驗證類型」上出現了不匹配（Mismatch）：</p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 C (There is an OSPF authentication configuration mismatch)：</strong> 正確。這是對上述錯誤訊息最直接的歸納，雙方的驗證設定不一致導致 Hello 封包被拒絕，無法建立 Adjacency。</li>\n<li><strong>選項 B (The local FortiGate has either OSPF cleartext or MD5 authentication configured)：</strong> 正確。從除錯日誌的 <code class=\"bg-slate-100 px-1 rounded text-xs\">OSPF: Header</code> -&gt; <code class=\"bg-slate-100 px-1 rounded text-xs\">AuType 0</code> 可以看出，<strong>本地 (Local) FortiGate 目前的 OSPF 驗證設定是 <code class=\"bg-slate-100 px-1 rounded text-xs\">AuType 0</code> (No Authentication)</strong>。然而，對方卻傳送了需要驗證的封包（導致出現 Mismatch），因此這證明了「本地端沒有配置驗證，但遠端 peer 卻配置了驗證 (Cleartext 或 MD5)」，雙方配置衝突，導致無法建立連線。</li>\n</ul>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A (The remote peer has either OSPF cleartext or MD5 authentication configured)：</strong> 雖然這句話本身描述了遠端的可能狀態，但在多重選擇題中，我們必須選擇能精確描述「雙方關係不匹配」的完整邏輯。選項 A 並未提及本地端狀況，若只選 A，無法構成「驗證類型不匹配」的完整結論。</li>\n<li><strong>選項 D (The local FortiGate does not have OSPF authentication configured)：</strong> 雖然這句話在事實上是正確的（由 <code class=\"bg-slate-100 px-1 rounded text-xs\">AuType 0</code> 可證），但它只解釋了本地端的狀態，無法作為「無法建立鄰居」的完整原因解釋。如果遠端對等設備也沒有開啟驗證，就不會產生 Mismatch。因此 B 和 C 組合才是解釋「為什麼雙方無法建立」的最佳答案。</li>\n</ul>\n<div class=\"h-2\"></div>\n<div class=\"h-2\"></div>\n<p>&gt; From: https://gemini.google.com/u/1/gem/b35649a1a5b1/b3e9829fa58f32b9</p>\n<div class=\"h-2\"></div>\n<p><strong>Q24 正確答案：A, D</strong> （<em>💡 溫馨提醒：你在外部題庫看到的參考答案可能是 B, D，但這是一個常見的題庫錯誤。依據 Fortinet 系統底層的運作邏輯與 Session Table 狀態標籤，正確答案絕對是 A 與 D。以下為你進行原理解析。</em>）</p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> Sessions, Traffic Flow, and Networking</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<div class=\"h-2\"></div>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A（正確）：</strong> 在這段會話表（Session Table）的輸出中，我們可以看到 <code class=\"bg-slate-100 px-1 rounded text-xs\">state</code> 欄位包含了 <code class=\"bg-slate-100 px-1 rounded text-xs\">local</code> 標籤 。根據 FortiOS 官方教材定義，<code class=\"bg-slate-100 px-1 rounded text-xs\">local</code> 標籤代表「Session is to/from local stack」（會話往返於本機堆疊）。當防火牆套用代理模式（Proxy-based）的安全檢查時，客戶端的 TCP 連線會先終止於 FortiGate 本機，再由 FortiGate 代理向外端伺服器發起另一段連線，因此在該會話中必定會出現 <code class=\"bg-slate-100 px-1 rounded text-xs\">local</code> 標籤，代表該會話終止於 FortiGate 或是由 FortiGate 所發起。</li>\n<li><strong>選項 D（正確）：</strong> 輸出中顯示了 <code class=\"bg-slate-100 px-1 rounded text-xs\">npu_state=00000000</code>  以及 <code class=\"bg-slate-100 px-1 rounded text-xs\">no_ofld_reason: npu-flag-off</code> ，這兩個參數明確指出該會話<strong>沒有</strong>被硬體加速（NPU Offloaded），而是完全交由 CPU 處理。同時，我們在輸出中看到 <code class=\"bg-slate-100 px-1 rounded text-xs\">url_cat=41</code> ，這代表此封包觸發了網頁過濾（Web Filter）的分類檢查。教材中也提到，網路處理器不會卸載設定了代理模式（Proxy-based）功能的會話，因此 FortiGate 的 CPU 必須接手進行安全設定檔的深度檢查 。</li>\n</ul>",
    "images": [
      "q23a.jpg"
    ]
  },
  {
    "id": 24,
    "q_en": "Refer to the exhibit.\n\nDebug output -\n\nWhich two statements about FortiGate behavior relating to this session are correct? (Choose two.)",
    "options": [
      "A. FortiGate either initiated the session or the session terminates at FortiGate.",
      "B. FortiGate redirected the client to the captive portal to authenticate so that a correct policy match could be made.",
      "C. FortiGate forwarded this session without any inspection.",
      "D. FortiGate is performing a security profile inspection using the CPU."
    ],
    "answer": "A, D",
    "explanation": "<p><strong>Q24 正確答案：A, D</strong> <em>(💡 溫馨提醒：你在外部題庫看到的參考答案可能是 B, D，但這是一個常見的題庫錯誤。依據 Fortinet 系統底層的運作邏輯與 Session Table 狀態標籤，正確答案絕對是 A 與 D。以下為你進行原理解析。)</em></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> Sessions, Traffic Flow, and Networking</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A（正確）：</strong> 在這段會話表（Session Table）的輸出中，我們可以看到 <code class=\"bg-slate-100 px-1 rounded text-xs\">state</code> 欄位包含了 <code class=\"bg-slate-100 px-1 rounded text-xs\">local</code> 標籤。根據 FortiOS 官方教材定義，<code class=\"bg-slate-100 px-1 rounded text-xs\">local</code> 標籤代表「Session is to/from local stack」（會話往返於本機堆疊）。當防火牆套用代理模式（Proxy-based）的安全檢查時，客戶端的 TCP 連線會先終止於 FortiGate 本機，再由 FortiGate 代理向外端伺服器發起另一段連線，因此在該會話中必定會出現 <code class=\"bg-slate-100 px-1 rounded text-xs\">local</code> 標籤，代表該會話終止於 FortiGate 或是由 FortiGate 所發起。</li>\n<li><strong>選項 D（正確）：</strong> 輸出中顯示了 <code class=\"bg-slate-100 px-1 rounded text-xs\">npu_state=00000000</code> 以及 <code class=\"bg-slate-100 px-1 rounded text-xs\">no_ofld_reason: npu-flag-off</code>，這兩個參數明確指出該會話沒有被硬體加速（NPU Offloaded），而是完全交由 CPU 處理。同時，我們在輸出中看到 <code class=\"bg-slate-100 px-1 rounded text-xs\">url_cat=41</code>，這代表此封包觸發了網頁過濾（Web Filter）的分類檢查。教材中也提到，網路處理器不會卸載設定了代理模式（Proxy-based）功能的會話，因此 FortiGate 的 CPU 必須接手進行安全設定檔的深度檢查。</li>\n</ul>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 B（錯誤，題庫陷阱）：</strong> 許多人會誤以為 <code class=\"bg-slate-100 px-1 rounded text-xs\">redir</code> 標籤代表將客戶端重新導向到 Captive Portal（強制門戶）進行認證。但請仔細觀察，輸出中並沒有出現 <code class=\"bg-slate-100 px-1 rounded text-xs\">auth</code>（會話需要認證）或 <code class=\"bg-slate-100 px-1 rounded text-xs\">authed</code>（會話已成功認證）的標籤。此外，該會話的參數為 <code class=\"bg-slate-100 px-1 rounded text-xs\">auth_info=0</code>，也證實了它並未牽涉任何形式的使用者認證機制。</li>\n<li><strong>選項 C（錯誤）：</strong> 輸出中已經明確顯示了 <code class=\"bg-slate-100 px-1 rounded text-xs\">url_cat=41</code>（網址分類代碼），這證明了 FortiGate 正在對此封包執行安全檢查（Security Profile Inspection），而非未經檢查就直接轉發。</li>\n</ul>",

  {
    "id": 25,
    "q_en": "Refer to the exhibits.\n\nNetwork topology -\n\n\nOSPF database -\n\nFGT-1 is an area border router (ABR) that has interfaces in OSPF areas 0.0.0.0 and 0.0.0.5. FGT-3 acts as an autonomous system border router (ASBR), importing static routes into OSPF. FGT-2 is an internal router with all its interfaces belonging to area 0.0.0.5. FGT-1 is receiving all advertised routes from FGT-2, however, FGT-3 is not receiving any of the advertised routes from FGT-1.\nWhat is the most likely reason for this?",
    "options": [
      "A. Area 0.0.0.5 is configured not to propagate type 5 LSAs.",
      "B. FGT-2 is configured with a distribution list to block all advertised routes from FGT-3.",
      "C. FGT-3 and FGT-2 have not formed an OSPF adjacency yet.",
      "D. IP protocol 89 is blocked between FGT-1 and FGT-3."
    ],
    "answer": "A",
    "explanation": "<p><strong>Q25 正確答案：A</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> OSPF (Dynamic Routing)</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>從題目提供的附圖中，我們可以清楚看到 FGT-2 執行 <code class=\"bg-slate-100 px-1 rounded text-xs\">get router info ospf database brief</code> 指令的輸出結果包含了 <code class=\"bg-slate-100 px-1 rounded text-xs\">Router Link States (Area 0.0.0.5 [Stub])</code> 、<code class=\"bg-slate-100 px-1 rounded text-xs\">Net Link States (Area 0.0.0.5 [Stub])</code>  以及 <code class=\"bg-slate-100 px-1 rounded text-xs\">Summary Link States (Area 0.0.0.5 [Stub])</code> 。這明確指出 <strong>Area 0.0.0.5 被設定為 Stub（末梢）區域</strong> 。</p>\n<div class=\"h-2\"></div>\n<p>在 OSPF 的架構定義中，Stub 區域是不允許 Type 5 LSA（AS External LSA，即外部路由的 LSA）進入的。因此，當 FGT-3 作為 ASBR 將靜態路由注入到 OSPF 成為 Type 5 LSA 時，FGT-1（ABR）會依照 Stub 區域的規則，阻擋這些 Type 5 LSA 傳播進入 Area 0.0.0.5。</p>\n<div class=\"h-2\"></div>\n<p><em>(💡 考題解析溫馨提醒：題庫題目原文中的 \"FGT-3 is not receiving any of the advertised routes from FGT-1\" 屬於題庫常見的文字誤植，其真實的邏輯應為「FGT-2 無法收到 FGT-3 注入的外部路由」。我們解題的鐵證在於資料庫輸出中明示的 <code class=\"bg-slate-100 px-1 rounded text-xs\">[Stub]</code> 標籤。)</em></p>",
    "images": [
      "q25a.jpg",
      "q25b.jpg"
    ]
  },
  {
    "id": 26,
    "q_en": "What can cause an IKEv2 tunnel to go down after it was initially brought up successfully?",
    "options": [
      "A. A mismatched proposal was detected during the IKE_AUTH exchange.",
      "B. A mismatched pre-shared key was detected during the IKE_AUTH exchange.",
      "C. Mismatched quick-mode selectors were detected during the Create_Child_SA exchange.",
      "D. A mismatched Diffie-Hellman group was detected during the IKE_SA_INIT exchange."
    ],
    "answer": "C",
    "explanation": "<p><strong>Q26 正確答案：C</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> IPsec-IKEv2 (Troubleshooting Concepts)</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<p>在 IKEv2 的協商過程中，建立通道的階段與 IKEv1 有所不同。IKEv2 的初始連線建立依賴於 <code class=\"bg-slate-100 px-1 rounded text-xs\">IKE_SA_INIT</code> 與 <code class=\"bg-slate-100 px-1 rounded text-xs\">IKE_AUTH</code> 兩個交換（Exchange）過程。題目明確指出通道「最初已經成功建立（initially brought up successfully）」，這意味著初始的 <code class=\"bg-slate-100 px-1 rounded text-xs\">IKE_SA_INIT</code> 和 <code class=\"bg-slate-100 px-1 rounded text-xs\">IKE_AUTH</code> 階段必定是完全吻合且成功通過的。</p>\n<div class=\"h-2\"></div>\n<p>通道在成功建立後又斷線，通常發生在<strong>金鑰重新協商（Rekey）</strong>的階段。在 IKEv2 中，Rekey 是透過 <code class=\"bg-slate-100 px-1 rounded text-xs\">Create_Child_SA</code> 交換來完成的。如果在 <code class=\"bg-slate-100 px-1 rounded text-xs\">Create_Child_SA</code> 階段發現第二階段（Phase 2）的快速模式選擇器（Quick-Mode Selectors）或安全提案（Proposals）不匹配，通道就會在 Rekey 失敗後斷開 。</p>\n<div class=\"h-2\"></div>\n<p><strong>❌ 錯誤選項分析：</strong></p>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A：</strong> <code class=\"bg-slate-100 px-1 rounded text-xs\">IKE_AUTH</code> 屬於初始建線階段。如果在 <code class=\"bg-slate-100 px-1 rounded text-xs\">IKE_AUTH</code> 階段就偵測到 Proposal 不匹配，通道根本無法「最初成功建立」，而是一開始就會失敗。</li>\n<li><strong>選項 B：</strong> 預先共用金鑰（Pre-shared key）的驗證也是在 <code class=\"bg-slate-100 px-1 rounded text-xs\">IKE_AUTH</code> 交換中進行的。若是 PSK 錯誤，連線會在初始驗證時就遭到拒絕，通道無法建立。</li>\n<li><strong>選項 D：</strong> <code class=\"bg-slate-100 px-1 rounded text-xs\">IKE_SA_INIT</code> 是 IKEv2 協商的最第一步（負責協商加密演算法與交換 Diffie-Hellman 參數）。如果在這邊就發生 DH 群組不匹配，協商會立即中斷，不可能發生題目所說的「最初成功建立」的情況。</li>\n</ul>",
    "images": []
  },

    "explanation": "<p><strong>Q29 正確答案：A, D</strong></p>\n<div class=\"h-2\"></div>\n<p><strong>📝 官方觀念出處：</strong> Sessions, Traffic Flow, and Networking (Session Helpers &amp; Expectation Sessions)</p>\n<div class=\"h-2\"></div>\n<p><strong>✅ 正解解析：</strong></p>\n<div class=\"h-2\"></div>\n<ul class=\"list-disc list-inside space-y-1 my-2 ml-2\">\n<li><strong>選項 A（正確）：</strong> 仔細觀察輸出中的 <code class=\"bg-slate-100 px-1 rounded text-xs\">expire=23</code> 欄位。對於 Expectation session（預期會話）而言，這代表該「針孔（Pinhole）」的等待倒數時間還剩下 23 秒。如果預期的資料通道（Data Channel）封包沒有在這 23 秒內抵達並觸發真實連線，FortiGate 就會將這個預期會話刪除。一旦針孔關閉，後續才抵達的封包若沒有一般防火牆政策允許，就會遭到直接丟棄。</li>\n<li><strong>選項 D（正確）：</strong> 當你使用 <code class=\"bg-slate-100 px-1 rounded text-xs\">diagnose sys session list expectation</code> 指令時，顯示出來的都是由 Session Helper（會話輔助程式）或 ALG 產生的「預期會話」。這些會話（又稱針孔）專門用於處理會動態分配連線埠的協定（例如 FTP、SIP 等）。當控制通道（Control Channel）協商出一個未來的隨機連接埠時，FortiGate 會預先開好這個針孔，等待該 TCP 或 UDP 動態連線的到來。</li>\n</ul>",
